# Russian overlay for data/parameters.yaml — merged in translate_parameters()
parameters:
  targen:
    "-d":
      name: "Тип устройства"
      tooltip_title: "Тип устройства (-d)"
      tooltip_body: |-
        Определяет комбинацию красителей вашего устройства вывода.

        Печатные пространства субтрактивны: значение устройства 0 = белый
        (без чернил), максимум = чёрный (полные чернила). Пространства
        видео/дисплеев аддитивны: значение 0 = чёрный, максимум = белый.

        Частые варианты:
          • Печать, серый (-d 0)  — одноканальный серый принтер
          • Видео, серый (-d 1)   — одноканальный дисплей/монитор
          • Печать RGB (-d 2)     — стандартный струйник RGB
                                    (по умолчанию, рекомендуется)
          • Видео RGB (-d 3)      — RGB-дисплей/монитор
          • CMYK (-d 4)           — четырёхцветный струйник или офсет
          • CMY (-d 5)            — три цвета, без отдельного чёрного

        Варианты 6–15 — для специальных многоканальных струйников с
        дополнительными чернилами (светло-голубой/пурпурный, оранжевый,
        зелёный, фиолетовый и т.д.). При необходимости уточните набор
        красителей через -D (эксперт).
      labels:
        - "Печать, серый"
        - "Видео, серый"
        - "Печать RGB (рекоменд.)"
        - "Видео RGB"
        - "CMYK"
        - "CMY"
        - "CMYK + светлые CM"
        - "CMYK + светлые CMK"
        - "CMYK + красный + синий"
        - "CMYK + оранжевый + зелёный"
        - "CMYK + красн. + зел. + син."
        - "CMYK + оранж. + зел. + фиол."
        - "CMYK + оранж. + зел. + син."
        - "CMYK + светлые CMK + сверхсв. K"
        - "CMYK + оранж. + зел. + светлые CM"
        - "CMYK + светлые CM + средние CM"
    "-D":
      name: "Краситель +/−"
      tooltip_title: "Добавить/убрать краситель (-D)"
      tooltip_body: |-
        Изменяет набор красителей, заданный типом устройства (-d),
        добавляя или убирая один краситель. Если выбранный краситель уже
        есть в наборе — он убирается; если нет — добавляется.

        Типичные применения:
          • Добавить оранжевый (-D 5) к стандартному CMYK для
            расширенного охвата
          • Добавить светло-голубой (-D 11) / светло-пурпурный (-D 12)
            к CMYK для более гладких градиентов в светах

        Включайте несколько слотов, чтобы наслаивать красители (каждый
        включённый слот открывает следующий, до 11 изменений всего).

        Для стандартных типов устройств 0–5 оставьте выключенным.
      labels:
        - "Аддитивный"
        - "Голубой"
        - "Пурпурный"
        - "Жёлтый"
        - "Чёрный"
        - "Оранжевый"
        - "Красный"
        - "Зелёный"
        - "Синий"
        - "Фиолетовый"
        - "Белый"
        - "Светло-голубой"
        - "Светло-пурпурный"
        - "Светло-жёлтый"
        - "Светло-чёрный"
        - "Средне-голубой"
        - "Средне-пурпурный"
        - "Средне-жёлтый"
        - "Средне-чёрный"
        - "Сверхсветлый чёрный"
    "-f":
      name: "Всего патчей"
      tooltip_title: "Общее число патчей (-f)"
      tooltip_body: |-
        Задаёт общее число цветовых патчей. Больше патчей = точнее
        профиль, но дольше печать и измерение.
        Типичные диапазоны для струйника RGB:
          • Быстрый тест:  400–600
          • Стандарт:      800–1200
          • Высокое кач.:  1500–2000
          • Очень высокое: 2500–3000

        Авто (рядом с полем): при включении число патчей считается на
        лету из выбранной бумаги, прибора, двойной плотности, левой
        кромки, масштаба патчей, полей и поля «Страницы» в разделе
        printtarg — берётся наибольшее значение, ровно заполняющее
        столько листов без пустого места. Пока Авто включено, поле
        неактивно и показывает текущую оценку. Для нестандартных
        раскладок (масштаб или поля не по умолчанию) Авто выполняет
        короткий двоичный поиск по targen, так что значение может
        обновляться с секундной задержкой.

        В пошаговом режиме считается автоматически из базы «патчей на
        страницу» × выбранное число страниц.
        В пошаговом режиме поставьте 0 для автоматического расчёта.
    "-e":
      name: "Белые патчи"
      tooltip_title: "Белые патчи (-e)"
      tooltip_body: |-
        Сколько патчей чистого белого бумаги добавить на мишень. Прибор
        измеряет их, чтобы точно узнать, насколько бела ваша бумага —
        это закрепляет светлый конец профиля. 4 — хорошее умолчание;
        очень глянцевым бумагам может помочь чуть больше.

        Авто (флажок):
        Включите «Авто», и ChromIQ выберет число за вас, исходя из
        того, сколько патчей вмещает вся мишень — маленькая одностраничная
        мишень получит немного белых патчей, большая многостраничная —
        больше, и думать об этом не придётся.

        Как считается автозначение:
          • Мишень примерно на 560 патчей получает 4 белых.
          • Каждый раз, когда мишень примерно удваивается, число растёт
            на 50% (4 → 6 → 8 …).
          • Никогда не выше 8 (больше — пустая трата места) и не ниже 2.

        Пока Авто включено, поле неактивно и показывает «Авто». В любой
        момент выключите и введите своё число.
    "-B":
      name: "Чёрные патчи"
      tooltip_title: "Чёрные патчи (-B)"
      tooltip_body: |-
        Сколько патчей максимальных чернил (чёрного устройства) добавить
        на мишень. Прибор измеряет их, чтобы узнать самый тёмный тон
        вашего принтера — это закрепляет теневой конец профиля.
        Для RGB-принтеров 4 — хорошее умолчание.

        Авто (флажок):
        Включите «Авто», и ChromIQ выберет число за вас, исходя из
        размера мишени — маленькая получит немного чёрных патчей,
        большая — больше.

        Как считается автозначение:
          • Мишень примерно на 560 патчей получает 4 чёрных.
          • Каждый раз, когда мишень примерно удваивается, число растёт
            на 50% (4 → 6 → 8 …).
          • Никогда не выше 8 и не ниже 2.

        Пока Авто включено, поле неактивно и показывает «Авто». В любой
        момент выключите и введите своё число.
    "-g":
      name: "Ступени серой оси"
      tooltip_title: "Ступени серой оси (-g)"
      tooltip_body: |-
        Дополнительные нейтрально-серые патчи, равномерно расставленные
        от белого до чёрного. Они помогают профилю чисто передавать
        серое, без цветовых сдвигов — важно для чёрно-белых фотографий и
        нейтральных тонов. Ориентир при ручной настройке: 0 для быстрого
        профиля, 50–100 для стандартного, 128+ для высокого качества.

        Авто (флажок):
        Включите «Авто», и ChromIQ выберет число за вас, в масштабе
        размера мишени — большая мишень получит более длинный и тонкий
        серый клин.

        Как считается автозначение:
          • Мишень примерно на 560 патчей получает 32 серые ступени.
          • Каждый раз, когда мишень примерно удваивается, ступени тоже
            удваиваются (32 → 64 → 128).
          • Никогда не выше 128 и не ниже 8.

        Пока Авто включено, поле неактивно и показывает «Авто». В любой
        момент выключите и введите своё число.

        (Пошаговый режим всегда настраивает это автоматически по тому же
        принципу.)
    "-G":
      name: "Тщательная оптимизация"
      tooltip_title: "Тщательная оптимизация (-G)"
      tooltip_body: |-
        Заставляет targen потратить больше времени, расставляя патчи как
        можно равномернее по цветовому охвату принтера. Тип набора патчей
        одинаков в любом случае (OFPS — оптимизированная выборка
        дальних точек, распределение по умолчанию); это просто переключает
        его из «быстрого» режима в «качественный».

        Рекомендуется ВКЛ для любой мишени, которую вы реально напечатаете
        и измерите: несколько лишних секунд машинного времени при создании
        мишени дают измеримо лучший профиль.

        Выключайте только при быстрых итерациях по настройкам мишени, когда
        абсолютное качество патчей неважно (например тест раскладок печати
        перед финальной мишенью).

        Не действует, когда «Распределение патчей» установлено не в OFPS —
        альтернативные распределения (случайное, квазислучайное,
        объёмноцентрированная решётка, …) игнорируют этот флаг.
    "-s":
      name: "Ступени одиночных каналов"
      tooltip_title: "Ступени одиночных каналов (-s)"
      tooltip_body: |-
        Добавляет патчи-клинья по одному каналу (R, G, B по отдельности).
        Полезно для характеристики поведения отдельных чернил.
        Типично: 0 для быстрого, 20–50 для стандартного, 50–100 для
        высокого качества.
    "-c":
      name: "Профиль предобработки"
      tooltip_title: "Профиль предобработки (-c)"
      tooltip_body: |-
        Существующий ICC-профиль этой пары принтер/бумага, используемый
        для предобработки распределения патчей в перцепционном
        пространстве. Прежний профиль здесь даёт патчи, равномернее
        распределённые в выходном охвате, и лучшую точность на втором
        проходе профилирования. Для первого профиля оставьте пустым.
    "-C":
      name: "Замена калибровки"
      tooltip_title: "Переопределение калибровки (-C)"
      tooltip_body: |-
        Необязательный файл .cal, чьи калибровочные кривые применяются
        при оценке лимита чернил для генерации патчей. Переопределяет
        любой .cal, встроенный в ICC-мишень .ti3 предыдущего прохода
        профилирования.

        Используйте, когда есть проверенная калибровка устройства
        (например из printcal/applycal) и вы хотите, чтобы targen учёл
        её при расчёте числа патчей в теневой области.

        Введите в поле «none» (без кавычек), чтобы явно запретить
        использование любого .cal, даже встроенного в .ti3.

        В большинстве случаев оставляйте пустым — нужно только при
        управлении отдельной калибровочной кривой независимо от профиля.
    "-n":
      name: "Ступени нейтральной оси"
      tooltip_title: "Ступени нейтральной оси (-n)"
      tooltip_body: |-
        Добавляет патчи-клинья вдоль перцепционно истинной нейтральной
        оси вашей пары принтер + бумага, заданной профилем предобработки,
        загруженным через -c.

        Чем отличается от -g (ступени серой оси):
          • -g идёт по RGB-значениям устройства (R = G = B): 0/0/0,
            32/32/32, 64/64/64 … Это предполагает, что равные значения
            устройства печатаются нейтральным серым, что верно лишь на
            идеально линеаризованном принтере. На реальном принтере
            «серый клин устройства» обычно имеет цветовой сдвиг.
          • -n спрашивает у заданного профиля: «какие RGB-значения
            нужны ИМЕННО ЭТОМУ принтеру, чтобы воспроизвести нейтральный
            патч L*a*b* (a* = b* = 0) на каждой ступени светлоты?»
            Эти (обычно неравные) RGB-значения добавляются как патчи.

        Чем отличается от -N (акцент нейтральной оси):
          • -N — регулятор 0–1, смещающий существующее распределение
            OFPS к нейтральной области. Именованных ступеней он не
            добавляет.
          • -n добавляет явные нейтральные патчи из профиля поверх того,
            что даёт остальное распределение.

        Когда использовать:
          • У вас уже есть профиль первого прохода для этой бумаги и вы
            делаете мишень доводки. Загрузите этот профиль в «Профиль
            предобработки» (-c), затем поставьте -n в 32–64, чтобы плотно
            охарактеризовать скорректированную нейтральную ось.
          • Для первой мишени без -c оставьте 0 — без профиля
            предобработки «истинной» нейтральной оси для выборки не
            существует, а клин в пространстве устройства уже покрывает -g.

        Типичные значения для доводки: 32 для обычной работы, 64 для
        художественной печати / цветопробы, где нейтральность критична.

        Требует заданного -c; иначе не действует.
    "-N":
      name: "Акцент нейтральной оси"
      tooltip_title: "Акцент нейтральной оси (-N)"
      tooltip_body: |-
        Управляет тем, насколько сильно патчи группируются у нейтральной
        оси. 0.0 = без акцента, 1.0 = максимальная концентрация у серого.
        Умолчание 0.5 подходит большинству принтеров.
    "-V":
      name: "Акцент на тенях"
      tooltip_title: "Акцент на тенях (-V)"
      tooltip_body: |-
        Добавляет патчи в тёмных (теневых) областях охвата.
        1.0 = без акцента (по умолчанию). Поднимите до 2.0–3.0 для
        принтеров со сложным поведением в тенях (например матовые
        художественные бумаги).
    "-l":
      name: "Лимит чернил (%)"
      tooltip_title: "Общий лимит чернил (-l)"
      tooltip_body: |-
        Максимальное суммарное количество чернил, которое принтеру
        позволено класть на бумагу, в процентах. 100% = один полный слой,
        200% = два полных слоя (например 100C + 100K) и так далее.

        Почему это важно (особенно для CMYK / CMYK+N):
        Без лимита targen спокойно генерирует патчи вроде 100C + 100M +
        100Y + 100K = 400%. Столько мокрых чернил может растекаться,
        долго сохнуть, пятнать и даже рвать бумагу — а профиль из таких
        патчей предсказывает цвета, которых принтер на деле не выдаёт.

        Как выбрать значение:
          • Большинство CMYK-струйников:  260–320%
          • Мелованные/глянцевые бумаги:  320–360%
          • Газетная, дешёвая бумага:     220–260%
          • Расширенный охват (CMYKOGV):  400–500%  (больше чернил
                                          делят общий бюджет)

        Если не уверены, посмотрите документацию принтера или
        рекомендации к бумаге, либо измерьте: напечатайте небольшой клин
        лимита чернил и возьмите наибольшее значение, сохнущее чисто и
        без растекания.

        Для RGB-процессов: обычно оставляйте выключенным — струйники RGB
        ограничивают чернила внутри себя, и targen не нужно делить бюджет
        между каналами.

        Отметьте флажок, чтобы включить.
    "__targen_distribution__":
      name: "Распределение патчей"
      tooltip_title: "Распределение патчей (-t / -r / -R / -q / -Q / -i / -I)"
      tooltip_body: |-
        Как targen решает, куда поместить каждый цветовой патч в охвате
        принтера. Разные алгоритмы дают разный баланс покрытия,
        равномерности и скорости.

        Выберите ОДИН. Они взаимоисключающие — выбор любого полностью
        заменяет стандартную расстановку OFPS.

        OFPS (по умолчанию, рекомендуется):
        Оптимизированная выборка дальних точек. Итеративно ставит каждый
        новый патч как можно дальше от всех существующих, давая самое
        равномерное покрытие из всех здешних алгоритмов. Медленнее
        альтернатив, но золотой стандарт качества профиля. Сочетайте с
        «Тщательной оптимизацией (-G)» для лучших результатов.

        Инкрементные дальние точки (-t):
        Более простой метод дальних точек. Быстрее OFPS, чуть менее
        равномерно. Когда OFPS слишком медленный на очень больших
        числах патчей и небольшая потеря качества приемлема.

        Случайное — пространство устройства (-r):
        Равномерно случайные патчи в сырых значениях устройства
        (например RGB). Максимально быстро, но покрытие в *воспринимаемом*
        цвете неравномерно — патчи тратятся в областях, которые глаз
        почти не различает.

        Случайное — перцепционное пространство (-R):
        Равномерно случайное в воспринимаемом цвете (Lab). Лучше -r, если
        случайное необходимо: патчи распределены равномерно по тому, что
        видит глаз. Всё равно хуже OFPS при том же числе.

        Квазислучайное заполнение (-q / -Q):
        Последовательности низкого расхождения (типа Соболя), заполняющие
        пространство равномернее настоящего случайного без итеративной
        цены OFPS. -q в пространстве устройства, -Q в перцепционном.
        Хорошая середина, когда OFPS слишком медленный.

        Объёмноцентрированная решётка (-i / -I):
        Фиксированная регулярная решётка (каждый патч окружён 8 соседями
        в кубическом узоре). Детерминирована и очень равномерна, но
        негибка — точные числа патчей, влезающие в решётку, ограничены.
        -i в пространстве устройства, -I в перцепционном.

        Большинству стоит оставить OFPS.
      labels:
        - "OFPS — оптимизир. (рекоменд.)"
        - "Инкрементные точки (-t)"
        - "Случайное — устройство (-r)"
        - "Случайное — перцепц. (-R)"
        - "Квазислучайное — устройство (-q)"
        - "Квазислучайное — перцепц. (-Q)"
        - "ОЦ-решётка — устройство (-i)"
        - "ОЦ-решётка — перцепц. (-I)"
    "-A":
      name: "Адаптация OFPS"
      tooltip_title: "Адаптация OFPS (-A)"
      tooltip_body: |-
        Насколько сильно OFPS изгибает своё правило равномерного покрытия,
        следуя форме профиля предобработки (-c). Имеет смысл только когда
        распределением выбран OFPS И задан профиль -c.

        0.0 = полностью игнорировать профиль — чистое равномерное
              покрытие в пространстве устройства, как будто -c не задан.
        1.0 = полностью следовать профилю — концентрировать патчи там,
              где профиль показывает интересные места охвата принтера
              (то есть форму реального цветового пространства).

        Умолчание targen — 0.10 (мягко) для первого прохода и 1.0 при
        заданном -c; ChromIQ держит 0.10, пока вы явно не измените,
        чтобы поведение не переключалось неожиданно.

        Поднимайте к 1.0 на проходах доводки, когда первому профилю вы
        доверяете и хотите, чтобы вторая мишень плотно выбирала реальный
        охват принтера, а не пустые углы пространства устройства.

        Отметьте флажок, чтобы включить.
    "-m":
      name: "Ступени внутри куба"
      tooltip_title: "Ступени внутри куба (-m)"
      tooltip_body: |-
        Добавляет регулярную сетку патчей *внутри* цветового куба
        принтера — N ступеней по каждой оси (N×N×N для RGB и т.д.). Они
        ставятся *в дополнение* к патчам, выбранным через -f, -g, -s и
        другие счётчики.

        Поставьте 0 (по умолчанию), чтобы пропустить — почти всегда
        правильный выбор. OFPS уже покрывает нутро куба эффективнее.

        Когда использовать:
          • Повторяемость между машинами: фиксированная сетка каждый раз
            одинакова независимо от того, какие позиции выбрал OFPS, что
            помогает сравнивать профили между запусками.
          • Диагностические мишени с предсказуемыми, именованными
            позициями куба.

        Типичные значения при использовании: 3–6 (ступеней на ось).
        Числа растут быстро — 6 ступеней в RGB это 216 патчей, 8 — 512.

        Отметьте флажок, чтобы включить.
    "-M":
      name: "Ступени на гранях куба"
      tooltip_title: "Ступени на гранях куба (-M)"
      tooltip_body: |-
        Добавляет регулярную сетку патчей на *поверхности* цветового куба
        принтера — N ступеней по каждой грани. Патчи идут снаружи
        (первичные, вторичные, край охвата), но не внутрь.

        Поставьте 0 (по умолчанию), чтобы пропустить.

        Когда использовать:
          • Хотите точно зафиксировать границу охвата и углы
            первичных/вторичных цветов без внутренних затрат -m.
          • Сравнение того, как разные чернила/бумаги сдвигают оболочку
            охвата — поверхностные патчи страдают сильнее всего.

        Типичные значения при использовании: 4–8 ступеней на грань.

        Отметьте флажок, чтобы включить.
    "-b":
      name: "Ступени ОЦ-решётки"
      tooltip_title: "Ступени ОЦ-решётки (-b)"
      tooltip_body: |-
        Добавляет патчи на объёмноцентрированной кубической (BCC)
        решётке — плотнее простой кубической сетки, потому что точки
        ставятся и в углах куба, и в центрах. N — число делений по
        каждой оси.

        Поставьте 0 (по умолчанию), чтобы пропустить — нишевая ручка.

        Когда использовать:
          • Нужны регулярные, выровненные по решётке позиции патчей с
            лучшей упаковкой, чем у -m, но без перехода на OFPS.
          • Исследования/повторяемость, где сама структура BCC и есть
            цель.

        Примечание: это форма *счётчика ступеней* (добавляет к вашему
        списку патчей); для мишени, у которой *всё* распределение — BCC,
        используйте селектор «Распределение патчей» выше и выберите там
        объёмноцентрированный вариант.

        Отметьте флажок, чтобы включить.
  printtarg:
    "-i":
      name: "Измерительный прибор"
      tooltip_title: "Измерительный прибор (-i)"
      tooltip_body: |-
        Сообщает генератору мишени, каким спектрофотометром вы будете
        читать напечатанную мишень. Сетка патчей строится под ширину
        полосы, размер патча и шаг именно этого прибора — выбрать
        правильно критически важно.

          •  i1Pro / i1Pro 2 / i1Pro 3 — ручной полосовой ридер, самый
             частый выбор. Читает колонку патчей одним проходом.

          •  i1Pro 3 Plus — версия i1Pro 3 с большей апертурой. Читает
             более крупные патчи, поэтому на лист помещается заметно
             меньше (~в 5 раз меньше, чем у обычного i1Pro).

          •  ColorMunki / i1Studio / ColorChecker Studio — устройство
             начального уровня. Сам по себе читает по одному патчу; с
             дополнительной направляющей — попарно (см. «Двойная
             плотность»).

          •  SpectroScan — планшетный XY-сканер. Моторизованная рука
             читает каждый патч отдельно, вмещая на лист куда больше
             цветов, чем любой полосовой ридер.

          •  i1iSis (через i1Profiler) — автоматический листовой ридер
             мишеней. ChromIQ не может управлять им напрямую: вместо
             этого список патчей сохраняется рядом с мишенью в формате
             i1Profiler, а процесс (печать, сканирование, сборка
             профиля) завершается там. Вкладки печати и измерения
             ChromIQ для этого устройства не используются.

        Неверный прибор даст мишень, по которой устройство не
        выровняется и не сможет надёжно читать — при измерении вы
        увидите «патчи не найдены» или ошибки выравнивания. В пошаговом
        режиме раскладка подстраивается автоматически.
      labels:
        - "i1Pro / i1Pro 2 / i1Pro 3"
        - "i1Pro 3 Plus"
        - "ColorMunki / i1Studio / ColorChecker Studio"
        - "SpectroScan (планшетный)"
        - "i1iSis (через i1Profiler)"
    "-h":
      name: "Двойная плотность"
      tooltip_title: "Двойная плотность (-h)"
      tooltip_body: |-
        Изменяет плотность патчей в полосе раскладки printtarg.
        Точный смысл зависит от активного прибора:

          •  ColorMunki / i1Studio / ColorChecker Studio — удваивает
             число патчей в каждой измерительной полосе. ТРЕБУЕТ
             физическую измерительную направляющую; без неё устройство
             не выровняется по плотному шагу и будет ошибаться.

          •  SpectroScan — переключает раскладку мишени с прямоугольных
             патчей на шестиугольные. Шестиугольники укладываются
             плотнее, ~14% больше патчей на лист. Дополнительное
             оборудование не нужно.

        Не действует на i1Pro и i1Pro 3 Plus и обычно скрыта при их
        выборе.
    "-p":
      name: "Размер бумаги"
      tooltip_title: "Размер бумаги (-p)"
      tooltip_body: |-
        Задаёт размеры каждого листа печатаемой мишени. Мишень всегда
        заполняет страницу от края до края — на большей бумаге больше
        патчей, то есть более детальный профиль с меньшего числа листов.

        Выбирайте тот размер, на котором действительно будете печатать,
        включая ориентацию. Полосовые ридеры (семейство i1Pro) читают
        сверху вниз, поэтому:

          •  Книжная — полосы длиннее, но их меньше. Стандартный выбор.

          •  Альбомная (A4R, LetterR, 420×297…) — полосы короче, но их
             больше. Когда принтер надёжнее подаёт альбомный лист или
             когда у книжного последняя полоса оказалась бы слишком
             близко к краю бумаги.

        Выберите «Свой», чтобы ввести точные ширину и высоту в
        миллиметрах, если ни один именованный размер не совпадает с
        вашей бумагой.

        При смене размера бумаги число патчей и страниц в предпросмотре
        команды обновляется автоматически.
      labels:
        - "A2 книжная (420 × 594 мм)"
        - "A2 альбомная (594 × 420 мм)"
        - "A3+ книжная (329 × 483 мм)"
        - "A3+ альбомная (483 × 329 мм)"
        - "A3 книжная (297 × 420 мм)"
        - "A3 альбомная (420 × 297 мм)"
        - "Tabloid / 11 × 17\""
        - "Legal (8.5 × 14\")"
        - "A4 книжная (210 × 297 мм)"
        - "A4 альбомная (297 × 210 мм)"
        - "Letter книжная (8.5 × 11\")"
        - "Letter альбомная (11 × 8.5\")"
        - "8×10\" (203 × 254 мм)"
        - "5×7\" (127 × 178 мм)"
        - "4×6\" (102 × 152 мм)"
        - "Свой (ввести размеры)"
    "-t":
      name: "DPI вывода TIFF"
      tooltip_title: "Разрешение TIFF (-t)"
      tooltip_body: |-
        Выходное разрешение растровых файлов мишени TIFF.
        Для полосовых приборов рекомендуется 300 DPI — хороший баланс
        размера файла и чёткости патчей.
        Для очень больших мишеней используйте 200 DPI, чтобы уменьшить
        файл. Большие значения (600+) нужны редко и дают огромные файлы.
    "-L":
      name: "Убрать левую кромку зажима"
      tooltip_title: "Убрать левую кромку зажима (-L)"
      tooltip_body: |-
        Убирает полосу зажима по левому краю, высвобождая ~15 мм ширины
        под дополнительные колонки патчей.
        Включайте, если не используете физический прижим листа.
        Все значения базы патчей предполагают, что этот флаг ВКЛЮЧЁН.
    "-a":
      name: "Масштаб патчей"
      tooltip_title: "Масштаб патчей (-a)"
      tooltip_body: |-
        Равномерно масштабирует размеры патчей и разделителей.
        1.0 — умолчание (оптимальный для прибора размер).
        Поднимите до 1.5–2.0 на грубых/фактурных бумагах, где прибору
        нужна большая площадь измерения.
        Уменьшение ниже 1.0 вмещает больше патчей на страницу, но может
        вызывать ошибки чтения на некоторых приборах.
        Примечание: изменение значения с умолчания запускает живой
        двоичный пересчёт вместо быстрого поиска по таблице.
    "-m":
      name: "Поля (мм)"
      tooltip_title: "Поля (-m / -M)"
      tooltip_body: |-
        Задаёт поля в миллиметрах и для печатаемой области (-m), и для
        размеров файла TIFF (-M). Оба синхронизированы.
        6 мм соответствуют минимальным полям большинства принтеров.
        Уменьшайте, только если принтер умеет печать без полей.

        Выбор прибора i1Pro / i1Pro 2 / i1Pro 3 / i1Pro 3 Plus
        автоматически поднимает значение до 10 мм, чтобы оптика
        полосового ридера не съезжала на голый край бумаги (ошибки
        «прочитано недостаточно патчей»). Переключение на ColorMunki /
        SpectroScan возвращает 6 мм. Своё значение (не 6 и не 10)
        сохраняется при смене приборов.

        Таблицы «патчей на страницу» существуют только для 6 и 10 мм —
        другие значения запускают живой двоичный пересчёт.
    "-r":
      name: "Сохранить порядок (без случайности)"
      tooltip_title: "Без рандомизации (-r)"
      tooltip_body: |-
        По умолчанию printtarg перемешивает позиции патчей, снижая
        артефакты дрейфа прибора. Включайте флаг, только если тестируете
        конкретную последовательность патчей или прибор требует
        упорядоченные патчи.
    "-b":
      name: "Ч/Б разделители"
      tooltip_title: "Принудительно ч/б разделители (-b)"
      tooltip_body: |-
        Принуждает разделители между полосами быть чёрно-белыми вместо
        цветных. Не влияет на число патчей и геометрию раскладки.

        Не действует при включённом «Без разделителей» (-n) — в этом
        случае опция неактивна и исключена из команды printtarg.
    "-P":
      name: "Не ограничивать длину полос"
      tooltip_title: "Не ограничивать длину полос (-P)"
      tooltip_body: |-
        По умолчанию printtarg ограничивает длину полос, чтобы каждая
        помещалась на бумаге без выхода за край. Включение флага снимает
        предел и допускает очень длинные полосы.
        Полезно для узкой рулонной бумаги или когда нужен минимум полос
        при данном числе патчей.
        Внимание: при большом числе патчей полосы могут выйти за край
        бумаги — проверьте сгенерированный TIFF перед печатью.
    "-N":
      name: "N-канальный TIFF (>4 чернил)"
      tooltip_title: "N-канальный TIFF (-N)"
      tooltip_body: |-
        Для принтеров с более чем 4 каналами чернил (например CMYK плюс
        дополнительные смесевые цвета) стандартный TIFF поддерживает
        максимум 4 канала. Флаг заставляет printtarg кодировать лишние
        каналы через слоты альфа-канала TIFF, сохраняя все значения
        чернил в одном файле.

        Включайте, только если драйвер принтера или RIP ожидает
        многоканальный TIFF. Для стандартного профилирования RGB или
        CMYK опция не нужна.
    "-K":
      name: "Применить калибровку"
      tooltip_title: "Применить калибровку к патчам (-K)"
      tooltip_body: |-
        Используйте, когда у принтера нет встроенной системы
        калибровки — то есть драйвер или RIP не может сам применить
        калибровочную кривую.

        Сначала запустите printcal из Argyll и получите файл .cal,
        описывающий линеаризацию принтера. Затем передайте его сюда:
        printtarg пересчитает каждое цветовое значение патча через
        калибровочные кривые до генерации мишени, и напечатанная мишень
        сразу отразит откалиброванное поведение устройства.
        .cal также встраивается в файл .ti2, чтобы colprof сослался на
        него при сборке ICC-профиля.

        Типичное применение: настольные струйники без встроенной
        линеаризации, печатающие напрямую из TIFF без RIP.

        Взаимоисключающе с «Встроить калибровку» (-I) — одновременно
        активна только одна опция калибровки.
    "-I":
      name: "Калибровка как ссылка"
      tooltip_title: "Встроить калибровку без применения (-I)"
      tooltip_body: |-
        Используйте, когда принтер или RIP уже применяет калибровочную
        кривую нативно — например производственный струйный RIP со
        своей LUT линеаризации или принтер со встроенной калибровкой
        плотности.

        В этом случае пересчёт значений патчей printtarg не нужен (это
        делает сам принтер), но colprof должен знать о калибровке. -I
        встраивает файл .cal в выходной .ti2 только как метаданные, не
        трогая значения патчей.

        Типичное применение: профессиональные струйные RIP (например
        EFI Fiery, Wasatch, ColorBurst) или принтеры со встроенной
        линеаризацией, активной при печати мишени.

        Взаимоисключающе с «Применить калибровку» (-K) — одновременно
        активна только одна опция калибровки.
    "-C":
      name: "Отключить сжатие TIFF"
      tooltip_title: "Отключить сжатие TIFF (-C)"
      tooltip_body: |-
        Выводит несжатые файлы TIFF вместо сжатия LZW по умолчанию.
        Несжатые файлы больше, но совместимы со всеми RIP и драйверами
        принтеров без исключения.
        Включайте, если ваш печатный процесс отказывается от сжатых
        TIFF или портит их.
    "-D":
      name: "Дизеринг 8 бит из 16"
      tooltip_title: "Дизеринг 8-битного вывода (-D)"
      tooltip_body: |-
        При генерации 8-битного TIFF использует дизеринг с диффузией
        ошибки для понижения из внутренней 16-битной точности. Это
        уменьшает полошение в плавных градиентах, которое иначе вызвало
        бы квантование.
        Действует только при выбранном 8-битном выводе TIFF.
    "-U":
      name: "Убрать заголовок CUPS CMM"
      tooltip_title: "Убрать заголовок CUPS CMM (-U)"
      tooltip_body: |-
        Удаляет комментарий «cupsJobTicket: cups-disable-cmm» из
        выходных файлов PostScript и EPS. Разные версии CUPS реагируют
        на этот комментарий по-разному.
        Опция влияет только на вывод PS/EPS и не действует на TIFF.
        Включайте, только если при печати применяется неожиданное
        управление цветом.
    "-R":
      name: "Зерно рандомизации"
      tooltip_title: "Зерно рандомизации (-R)"
      tooltip_body: |-
        Задаёт стартовое зерно алгоритма перемешивания патчей.
        Одинаковое зерно при одинаковом числе патчей всегда даёт ту же
        раскладку — мишени полностью воспроизводимы.
        Полезно для исследований или когда позже нужно воссоздать
        идентичную мишень.
        Не действует при включённом «Сохранить порядок» (-r).
    "-Q":
      name: "Биты квантования"
      tooltip_title: "Квантовать значения патчей (-Q)"
      tooltip_body: |-
        Округляет все цветовые значения патчей до указанной разрядности
        перед генерацией мишени. Например -Q 8 округляет всё до 8-битной
        точности (256 уровней).
        Используйте, когда печатный конвейер даёт полошение на
        конкретной разрядности и нужно тестировать ровно на этой
        точности.
    "-A":
      name: "Масштаб разделителей"
      tooltip_title: "Масштаб только разделителей (-A)"
      tooltip_body: |-
        Применяет дополнительный коэффициент масштаба только к полосам
        разделителей, не меняя размеры патчей, заданные -a.
        Значения выше 1.0 делают разделители шире; ниже — уже. Полезно
        приборам, которым нужно больше промежутка между полосами, или
        когда хочется вернуть место, сузив разделители при неизменном
        размере патчей.

        Не действует при включённом «Без разделителей» (-n) — в этом
        случае опция неактивна и исключена из команды printtarg.
    "-n":
      name: "Без разделителей"
      tooltip_title: "Без разделителей (-n)"
      tooltip_body: |-
        Убирает все полосы разделителей между патчами и полосами.
        Обычно разделители помогают прибору определять границы и
        направление полос.
        Отключайте, только если ваш процесс измерения явно не полагается
        на них (например некоторые планшетные сканеры).

        При включении «Ч/б разделители» (-b) и «Масштаб только
        разделителей» (-A) автоматически отключаются — оба касаются
        только разделителей.
    "-c":
      name: "Цветные разделители"
      tooltip_title: "Принудительно цветные разделители (-c)"
      tooltip_body: |-
        Принуждает области разделителей между патчами рисоваться в
        цвете, а не как по умолчанию (что в зависимости от профиля
        прибора может быть чёрно-белым). Может улучшить распознавание
        полос на некоторых цветных струйниках, где чёрные разделители
        слабо контрастируют с тёмными патчами.
  chartread:
    "-B":
      name: "Двунаправл. отключено"
      tooltip_title: "Отключить двунаправленное чтение (-B)"
      tooltip_body: |-
        Запрещает chartread автоматически определять, провели вы полосу
        вперёд или назад. ChromIQ по умолчанию держит это выключенным,
        чтобы прибор читал полосы в обе стороны.

        Включайте, только если прибор выдаёт ложные ошибки направления
        полосы во время измерения.
    "-b":
      name: "Двунаправл. принудительно"
      tooltip_title: "Принудительное двунаправленное чтение (-b)"
      tooltip_body: |-
        Заставляет chartread принимать полосу, проведённую в любую
        сторону.

        Обычно chartread автоматически определяет направление полосы
        только на перемешанных мишенях; на мишени с фиксированным
        порядком он читает в одну сторону и отклоняет полосы, проведённые
        задом наперёд. Включите, чтобы принудить определение в любом
        случае — полезно для семейства i1 Pro, которое читает в обе
        стороны. Противоположность -B; действует только один из них.
    "-S":
      name: "Подавлять предупреждения"
      tooltip_title: "Подавлять предупреждения (-S)"
      tooltip_body: |-
        Подавляет нефатальные диалоги предупреждений измерения от
        chartread. Рекомендуется для автономных или пакетных сеансов.
        Ошибки, мешающие созданию профиля, сообщаются всё равно.
    "-N":
      name: "Откл. начальную калибровку"
      tooltip_title: "Отключить начальную калибровку (-N)"
      tooltip_body: |-
        Пропускает автоматическую калибровку прибора по белой плитке
        при запуске. Используйте, только если уже калибровали прибор в
        этом сеансе и хотите измерять дополнительные мишени без
        повторной калибровки.
    "-p":
      name: "Попатчевый режим"
      tooltip_title: "Попатчевый режим (-p)"
      tooltip_body: |-
        Переключает с чтения полос на измерение отдельных патчей.
        Полезно для ручных одиночных измерений или если чтение полос не
        удаётся на конкретной бумаге. На больших мишенях заметно
        медленнее.
    "-H":
      name: "Спектральный режим выс. разрешения"
      tooltip_title: "Спектр высокого разрешения (-H)"
      tooltip_body: |-
        Включает спектральное сэмплирование высокого разрешения на
        поддерживающих приборах (например i1Pro 2/3). Даёт более точные
        значения Lab, слегка увеличивая время измерения.
    "-T":
      name: "Допуск патчей"
      tooltip_title: "Множитель допуска патчей (-T)"
      tooltip_body: |-
        Множитель встроенного в chartread порога согласованности
        патчей — это не значение ΔE. chartread перечитывает каждый патч
        и отклоняет полосы, где чтения расходятся больше, чем
        порог × это число.

        Меньше = строже. Строгая настройка рано ловит реальные проблемы:
        забитые дюзы, мало чернил, грязные ролики барабана, плывущий
        лазерный тонер. На исправной паре принтер + спектрофотометр
        умолчание 0.7 оставляет комфортный запас; опытные пользователи
        printerknowledge.com работают с 0.4 на i1 Pro 2 / 3.

        Поднимите до 0.8–1.5 при ложных ошибках «несогласованный патч»
        на фактурных, матовых или художественных бумагах — там сама
        поверхность даёт реальный разброс. Значения выше 2 в основном
        маскируют настоящие проблемы; если они нужны, сначала почините
        принтер.
    "-l":
      name: "Сохранять D50 L*a*b*"
      tooltip_title: "L*a*b* вместо XYZ (-l)"
      tooltip_body: |-
        Сохраняет данные измерений как D50 L*a*b* вместо XYZ.
        Большинство процессов используют XYZ (умолчание). Включайте,
        только если дальнейшие инструменты явно требуют вход L*a*b*.
    "-X":
      name: "Коррекция колориметра"
      tooltip_title: "Матрица коррекции колориметра (-X)"
      tooltip_body: |-
        Применяет матрицу коррекции колориметра (.ccmx) или
        калибровочный спектральный набор (.ccss), повышая точность
        колориметра.
        Имеет смысл только для колориметров (не спектрофотометров).
        Правильный файл возьмите у производителя прибора или создайте
        инструментами ccss/ccmx из ArgyllCMS.
  colprof:
    "-D":
      name: "Описание профиля"
      tooltip_title: "Описание профиля (-D)"
      tooltip_body: |-
        Имя, встроенное в ICC-профиль — показывается в меню управления
        цветом в Photoshop, Lightroom, Просмотре и др.

        Используйте единый формат, по которому видно принтер, бумагу,
        тип чернил и дату — нужный профиль потом легко найти:

          Принтер · Бумага · Тип чернил · Дата
          напр. "Epson P900 · Canson Baryta · Chromatic · 2026-04"

        Выходной файл называется по файлу .ti3 — держите имя в одном
        стиле с описанием, заменяя пробелы подчёркиваниями:
          напр. EpsonP900_CansonBaryta_Chromatic_2026-04.icc
    "-a":
      name: "Алгоритм профиля"
      tooltip_title: "Алгоритм профиля (-a)"
      tooltip_body: |-
        Выбирает алгоритм цветового преобразования:
        • Lab cLUT (-al): лучшая точность для профилей принтеров.
          Полная 3D-таблица поиска в пространстве L*a*b*. Рекомендуется.
        • XYZ cLUT (-ax): как Lab, но в пространстве XYZ.
          Иногда даёт более гладкие нейтральные градиенты.
        • Матрица/гамма (-ag, -as): более простая модель, менее точная
          для сложного поведения принтеров, но быстрее в расчёте.
        Для первых профилей RGB-принтеров всегда берите Lab cLUT (-al).
      labels:
        - "l — Lab cLUT (рекоменд. для RGB)"
        - "x — XYZ cLUT"
        - "X — XYZ cLUT (абсолютный)"
        - "g — гамма + матрица (быстро)"
        - "G — гамма + матрица (принуд.)"
        - "s — одна гамма + матрица"
        - "S — одна гамма + матрица (принуд.)"
        - "m — только матрица"
        - "M — только матрица (принуд.)"
    "-q":
      name: "Качество профиля"
      tooltip_title: "Качество профиля (-q)"
      tooltip_body: |-
        Управляет разрешением сетки cLUT и итерациями сглаживания:
        • Низкое: сетка 17³ — быстрый тест, не для работы
        • Среднее: сетка 33³ — хороший баланс, рекомендуемое умолчание
        • Высокое: сетка 45³ — производственное качество
        • Ультра: сетка 65³ — максимальная точность, очень медленно
        Для большинства струйных задач достаточно среднего.
        Для художественной печати и контрактной цветопробы — высокое.
      labels:
        - "l — низкое (быстро, ~30 с)"
        - "m — среднее (рекоменд., ~2 мин)"
        - "h — высокое (~10 мин)"
        - "u — ультра (~30+ мин)"
    "-b":
      name: "Качество таблиц B2A"
      tooltip_title: "Качество таблиц B2A (-b)"
      tooltip_body: |-
        Независимо управляет качеством таблиц B2A (устройство→PCS),
        используемых для входных преобразований (например экранная
        цветопроба).
        Оставьте пустым, чтобы следовать основной настройке -q.
        «n» убирает таблицы B2A и уменьшает размер файла профиля
        (профилям только для вывода B2A не нужны).
      labels:
        - "Как качество профиля (умолч.)"
        - "l — низкое"
        - "m — среднее"
        - "h — высокое"
        - "u — ультра"
        - "n — нет (убрать таблицы B2A)"
    "-r":
      name: "Сглаживание / шум (%)"
      tooltip_title: "Средний шум устройства (-r)"
      tooltip_body: |-
        Оценка среднего шума измерений или устройства в процентах ΔE.
        Большие значения усиливают сглаживание профиля, снижая влияние
        патчей-выбросов.
        • 0.5%: чистые измерения, ухоженный принтер
        • 1.0–2.0%: шумные измерения или фактурная бумага
        • 3.0–5.0%: очень шумно; сглаживание заметно усиливается
    "-s":
      name: "Охват: перцепционный"
      tooltip_title: "Источник охвата для перцепционного (-s)"
      tooltip_body: |-
        Исходный ICC-профиль для расчёта таблиц преобразования охвата
        перцепционного метода (A2B / B2A перцепционные).
        Без него перцепционный метод использует колориметрические
        данные напрямую (без сжатия охвата).
        Обычно ставится стандартное рабочее пространство RGB вроде
        AdobeRGB или ProPhoto RGB.
        Принимаются и .icc, и .icm — ICM это просто название формата
        ICC у Microsoft, файлы идентичны.
    "-S":
      name: "Охват: перц. + насыщ."
      tooltip_title: "Источник перцепционного + насыщенности (-S)"
      tooltip_body: |-
        Как -s, но применяет преобразование охвата и к перцепционному,
        и к насыщенному методам.
    "-A":
      name: "Производитель"
      tooltip_title: "Строка производителя (-A)"
      tooltip_body: |-
        Строка производителя в заголовке ICC-профиля.
        Необязательно — используется для идентификации в списках
        профилей.
    "-M":
      name: "Модель"
      tooltip_title: "Строка модели (-M)"
      tooltip_body: |-
        Строка модели в заголовке ICC-профиля.
    "-C":
      name: "Авторские права"
      tooltip_title: "Строка авторских прав (-C)"
      tooltip_body: |-
        Уведомление об авторских правах, встроенное в ICC-профиль.
    "-ni":
      name: "Без входных кривых"
      tooltip_title: "Без входных формирующих кривых (-ni)"
      tooltip_body: |-
        Отключает одномерные входные тоновые кривые, предобрабатывающие
        значения устройства перед 3D cLUT. Обычно эти кривые повышают
        точность профиля. Отключайте только для диагностики.
    "-no":
      name: "Без выходных кривых"
      tooltip_title: "Без выходных формирующих кривых (-no)"
      tooltip_body: |-
        Отключает одномерные выходные формирующие кривые после 3D cLUT.
        Отключайте только для диагностики.
    "-V":
      name: "Акцент сетки на тенях"
      tooltip_title: "Акцент сетки на тенях (-V)"
      tooltip_body: |-
        Добавляет точки сетки cLUT в тёмных (теневых) областях.
        1.0 = равномерная сетка (по умолчанию). Поднимите до 1.5–2.0 для
        принтеров со сложным поведением в тенях или забитыми чёрными.
  profcheck:
    "-v":
      name: "Детальность"
      tooltip_title: "Детальность (-v)"
      tooltip_body: |-
        Попатчевый режим выводит индивидуальный ΔE каждого патча — это
        нужно для анализа по полосам и доводки с подсказками. Режим
        сводки показывает только среднюю и пиковую ошибки.
      labels:
        - "2 — попатчево (для анализа полос)"
        - "1 — только сводка"
    "-I":
      name: "Метод преобразования"
      tooltip_title: "Метод преобразования (-I)"
      tooltip_body: |-
        Абсолютный колориметрический проверяет абсолютную точность
        цвета вместе с точкой белого — стандарт для профилирования
        принтеров. Относительный нормализует к точке белого носителя.
      labels:
        - "a — абсолютный (умолч.)"
        - "r — относительный"
    "-s":
      name: "Сортировать по ΔE"
      tooltip_title: "Сортировка по ΔE (-s)"
      tooltip_body: |-
        Сортирует вывод profcheck так, чтобы худшие патчи шли первыми.
        Полезно для быстрого выявления проблемных областей.
        Действует только при попатчевой детальности.
    "-i":
      name: "Источник света"
      tooltip_title: "Источник света (-i)"
      tooltip_body: |-
        Выбирает источник света для пересчёта спектральных измерений в
        значения цвета. Имеет смысл, только если .ti3 содержит
        спектральные данные. D50 — стандарт для профилирования печати.
      labels:
        - "D50 (умолч.)"
        - "D50M2 (D50 + УФ-фильтр)"
        - "D65 (дневной 6500 K)"
        - "A (лампа накаливания)"
        - "C (имитация дневного, старый)"
        - "F5 (люминесцентный CWF)"
        - "F8 (люминесц. имитация D50)"
        - "F10 (люминесц. Ultralume)"
    "-o":
      name: "Наблюдатель CIE"
      tooltip_title: "Наблюдатель CIE (-o)"
      tooltip_body: |-
        Определяет модель стандартного наблюдателя для колориметрических
        расчётов. Наблюдатель 1931 2° — стандарт ICC для профилирования
        печати. Оставьте умолчание, если иное специально не требуется.
      labels:
        - "1931 2° (умолч.)"
        - "1964 10°"
        - "2015 2° (Stockman)"
        - "2015 10° (Stockman)"
        - "Shaw & Fairchild"
    "-P":
      name: "Отсечь выбросы (ΔE ≤)"
      tooltip_title: "Урезать .ti3 до ΔE ≤ (-P)"
      tooltip_body: |-
        Создаёт урезанную копию файла .ti3 только с патчами, чья
        цветовая ошибка не выше заданного порога.
        Полезно, если плохо измеренные патчи тянут профиль вниз.
        Включите опцию и задайте максимально приемлемое значение ΔE.
    "-w":
      name: "3D-визуализация X3DOM"
      tooltip_title: "Визуализация X3DOM (-w)"
      tooltip_body: |-
        Генерирует интерактивную 3D-визуализацию цветовых ошибок
        профиля. Откройте полученный файл .x3d.html в любом современном
        браузере и изучите, в каких частях цветового охвата ошибки
        наибольшие.
  printcal:
    "-v":
      name: "Детальность"
      tooltip_title: "Детальность (-v)"
      tooltip_body: |-
        Управляет объёмом вывода printcal при калибровке.
          0 = тихо
          1 = базовый прогресс (умолчание)
          2 = детали по каналам
          3 = отладочный вывод
    "-s":
      name: "Сглаживание кривых"
      tooltip_title: "Сглаживание кривых (-s)"
      tooltip_body: |-
        Управляет дополнительным сглаживанием калибровочных кривых.
        Большие значения дают более гладкие, но менее точные кривые.

        Умолчание: 1.0 — хорошо для большинства принтеров.
        Поднимите (например 2.0–5.0), если тоновый отклик принтера
        шумный или калибровочные кривые выглядят рваными.
    "-z":
      name: "Разрешение кривых"
      tooltip_title: "Разрешение кривых (-z)"
      tooltip_body: |-
        Число ступеней в выходных таблицах калибровочных кривых.
        Больше — тоньше разрешение, но крупнее файлы .cal.
        Умолчание (256) подходит практически всем принтерам.
    "-A":
      name: "Производитель"
      tooltip_title: "Производитель (-A)"
      tooltip_body: |-
        Задаёт описание производителя, встроенное в файл .cal.
        Чисто информационно — на калибровочные кривые не влияет.
    "-M":
      name: "Модель"
      tooltip_title: "Модель (-M)"
      tooltip_body: |-
        Задаёт описание модели принтера, встроенное в файл .cal.
        Чисто информационно — на калибровочные кривые не влияет.
    "-D":
      name: "Описание"
      tooltip_title: "Описание (-D)"
      tooltip_body: |-
        Задаёт человекочитаемое описание, встроенное в файл .cal.
        Чисто информационно — на калибровочные кривые не влияет.
    "-C":
      name: "Авторские права"
      tooltip_title: "Авторские права (-C)"
      tooltip_body: |-
        Задаёт строку авторских прав, встроенную в файл .cal.
        Чисто информационно — на калибровочные кривые не влияет.
  applycal:
    "-v":
      name: "Подробно"
      tooltip_title: "Подробно (-v)"
      tooltip_body: |-
        Печатает детальную информацию о применяемой калибровке, включая
        статистику кривых по каждому каналу.
