# Simplified Chinese overlay for data/parameters.yaml — merged in translate_parameters()
parameters:
  targen:
    "-d":
      name: "设备类型"
      tooltip_title: "设备类型 (-d)"
      tooltip_body: |-
        定义输出设备的色料组合。

        打印色彩空间是减色法: 设备值0 = 白（无墨），最大 = 黑（满墨）。
        视频/显示器色彩空间是加色法: 设备值0 = 黑，最大 = 白。

        常见选择:
          • 打印灰 (-d 0)   — 单通道灰度打印机
          • 视频灰 (-d 1)   — 单通道显示器
          • 打印RGB (-d 2)  — 标准RGB喷墨（默认，推荐）
          • 视频RGB (-d 3)  — RGB显示器
          • CMYK (-d 4)     — 四色喷墨或胶印机
          • CMY (-d 5)      — 三色，无独立黑通道

        选项6〜15用于带额外墨水（淡青/淡品红、橙、绿、紫等）的
        特殊多通道喷墨打印机。需要时用 -D（专家）微调色料组合。
      labels:
        - "打印灰"
        - "视频灰"
        - "打印RGB（推荐）"
        - "视频RGB"
        - "CMYK"
        - "CMY"
        - "CMYK + 淡CM"
        - "CMYK + 淡CMK"
        - "CMYK + 红 + 蓝"
        - "CMYK + 橙 + 绿"
        - "CMYK + 红 + 绿 + 蓝"
        - "CMYK + 橙 + 绿 + 紫"
        - "CMYK + 橙 + 绿 + 蓝"
        - "CMYK + 淡CMK + 极淡K"
        - "CMYK + 橙 + 绿 + 淡CM"
        - "CMYK + 淡CM + 中CM"
    "-D":
      name: "添加/移除色料"
      tooltip_title: "添加/移除色料 (-D)"
      tooltip_body: |-
        通过添加或移除单个色料来修改设备类型 (-d) 确定的色料组合。
        所选色料已在组合中则被移除；不在则被添加。

        典型用途:
          • 给标准CMYK加橙 (-D 5) 以扩展色域
          • 给CMYK加淡青 (-D 11) / 淡品红 (-D 12)，
            让高光渐变更平滑

        启用多个槽位可叠加更多色料（每启用一个就出现下一个，
        最多11项修改）。

        标准设备类型0〜5请保持禁用。
      labels:
        - "加色"
        - "青"
        - "品红"
        - "黄"
        - "黑"
        - "橙"
        - "红"
        - "绿"
        - "蓝"
        - "紫"
        - "白"
        - "淡青"
        - "淡品红"
        - "淡黄"
        - "淡黑"
        - "中青"
        - "中品红"
        - "中黄"
        - "中黑"
        - "极淡黑"
    "-f":
      name: "总色块数"
      tooltip_title: "总色块数 (-f)"
      tooltip_body: |-
        设置色块总数。色块越多配置文件精度越高，但打印和测量
        时间也越长。
        RGB喷墨的典型范围:
          • 快速测试: 400〜600
          • 标准:     800〜1200
          • 高质量:   1500〜2000
          • 极高:     2500〜3000

        自动（数值框旁）: 勾选后，色块数会根据所选纸张、仪器、
        双倍密度、左边条、色块缩放、页边距以及printtarg部分的
        页数框实时计算 — 选出恰好填满那么多页且不留空的最大值。
        自动开启时数值框灰显并显示当前估计值。自定义布局（非默认
        色块缩放或页边距）下自动会对targen做一次短暂的二分查找，
        因此数值可能要一秒钟才更新。

        引导模式下由每页色块数数据库 × 所选页数自动计算。
        在引导模式下设为0即使用自动计算。
    "-e":
      name: "白色块"
      tooltip_title: "白色块 (-e)"
      tooltip_body: |-
        加到色卡上的纯纸白色块数量。仪器测量它们以准确了解你的
        纸有多白，从而锚定配置文件的明部一端。4是不错的默认值；
        很亮的光面纸可以多加几个。

        自动（复选框）:
        打开「自动」，ChromIQ会根据整张色卡的色块数替你选这个
        数 — 小的单页色卡得到少量白色块，大的多页色卡得到更多，
        你完全不用操心。

        自动数值的计算方式:
          • 约560色块的色卡得到4个白色块。
          • 色卡每翻一倍，数量增加50%（4 → 6 → 8 …）。
          • 永不超过8（再多就是浪费空间），也永不低于2。

        自动开启时此框灰显并显示「自动」。随时可以关掉它，
        输入自己的数。
    "-B":
      name: "黑色块"
      tooltip_title: "黑色块 (-B)"
      tooltip_body: |-
        加到色卡上的最大墨量（设备黑）色块数量。仪器测量它们
        以了解打印机能产生的最暗色调，从而锚定配置文件的阴影
        一端。RGB打印机用4是不错的默认值。

        自动（复选框）:
        打开「自动」，ChromIQ会根据整张色卡的色块数替你选这个
        数 — 小色卡得到少量黑色块，大色卡更多。

        自动数值的计算方式:
          • 约560色块的色卡得到4个黑色块。
          • 色卡每翻一倍，数量增加50%（4 → 6 → 8 …）。
          • 永不超过8，也永不低于2。

        自动开启时此框灰显并显示「自动」。随时可以关掉它，
        输入自己的数。
    "-g":
      name: "灰轴级数"
      tooltip_title: "灰轴级数 (-g)"
      tooltip_body: |-
        从白到黑均匀放置的额外中性灰色块。它们帮助配置文件干净
        地再现灰色、不带色偏 — 对黑白照片和中性色调很重要。
        手动设置的粗略指南: 快速配置文件0，标准50〜100，
        高质量128以上。

        自动（复选框）:
        打开「自动」，ChromIQ会按整张色卡的色块数为你选数 —
        色卡越大，灰阶越长越细。

        自动数值的计算方式:
          • 约560色块的色卡得到32级灰。
          • 色卡每翻一倍，级数也翻倍（32 → 64 → 128）。
          • 永不超过128，也永不低于8。

        自动开启时此框灰显并显示「自动」。随时可以关掉它，
        输入自己的数。

        （引导模式始终按同样的思路自动设置。）
    "-G":
      name: "彻底优化（慢）"
      tooltip_title: "彻底优化 (-G)"
      tooltip_body: |-
        让targen多花时间，把色块在打印机色域内放得尽可能均匀。
        无论开关，色块集的类型都一样（OFPS — 优化最远点采样，
        默认分布）；这只是把它从「快速」模式切到「优质」模式。

        凡是真的要打印和测量的色卡都推荐开启: 生成色卡时多花
        几秒电脑时间，换来可测得出来的更好配置文件。

        只有在快速反复试验色卡设置、不在乎色块绝对质量时才关闭
        （例如确定最终色卡前先测试打印布局）。

        「色块分布」设为OFPS以外的任何值时无效 — 替代分布
        （随机、准随机、体心立方等）会忽略此参数。
    "-s":
      name: "单通道级数"
      tooltip_title: "单通道级数 (-s)"
      tooltip_body: |-
        添加单通道渐变色块（R、G、B分别）。
        适合刻画单种墨水的行为。
        典型值: 快速0，标准20〜50，高质量50〜100。
    "-c":
      name: "预调节配置文件"
      tooltip_title: "预调节配置文件 (-c)"
      tooltip_body: |-
        这台打印机/这种纸组合的现有ICC配置文件，用于在感知空间
        中预调节色块分布。在这里用旧配置文件能让色块在输出色域
        中分布得更均匀，第二轮配置文件制作的精度更高。第一次做
        配置文件请留空。
    "-C":
      name: "校准覆盖"
      tooltip_title: "校准覆盖 (-C)"
      tooltip_body: |-
        可选的 .cal 文件，在为色块生成估算墨量限制时应用其校准
        曲线。它会覆盖上一轮配置文件制作产生的ICC目标 .ti3 中
        嵌入的任何 .cal。

        当你有经过验证的设备校准（如来自printcal/applycal），
        并希望targen在计算阴影区域需要多少色块时把它考虑进去
        的时候使用。

        在栏中输入「none」（不带引号）可明确阻止使用任何
        .cal，即使 .ti3 中嵌有一个。

        大多数流程留空即可 — 只有独立于配置文件管理单独的
        校准曲线时才需要。
    "-n":
      name: "中性轴级数"
      tooltip_title: "中性轴级数 (-n)"
      tooltip_body: |-
        沿打印机 + 纸张感知上真正的中性轴（由 -c 加载的预调节
        ICC配置文件定义）添加额外的楔形色块。

        与 -g（灰轴级数）的区别:
          • -g 走RGB设备值（R = G = B）: 0/0/0、32/32/32、
            64/64/64 … 这假设相等的设备值打出来是中性灰，
            而这只在完全线性化的打印机上成立。真实打印机上
            「设备灰阶」通常带色偏。
          • -n 则询问所给的配置文件:「这台打印机在每个明度
            级别上要再现中性的L*a*b*（a* = b* = 0）色块，
            实际需要什么RGB值？」那些（通常不相等的）RGB值
            被作为色块加入。

        与 -N（中性轴强调）的区别:
          • -N 是一个0〜1的旋钮，把现有OFPS色块分布向中性
            区域偏置。它不添加具名级数。
          • -n 在其余分布产生的色块之外，额外添加来自配置
            文件的明确中性色块。

        何时使用:
          • 这种纸已有第一轮ICC配置文件，正在做优化色卡。
            把那个配置文件加载到预调节配置文件 (-c)，再把
            -n 设为32〜64，密集刻画校正后的中性轴。
          • 没有 -c 的首次色卡保持0 — 没有预调节配置文件就
            没有可采样的「真」中性轴，设备空间的灰阶 -g
            已经覆盖了。

        优化时的典型值: 常规工作32，中性至关重要的艺术微喷/
        打样64。

        必须设置 -c；否则无效。
    "-N":
      name: "中性轴强调"
      tooltip_title: "中性轴强调 (-N)"
      tooltip_body: |-
        控制色块向中性轴聚集的强度。
        0.0 = 不强调，1.0 = 向灰最大程度聚集。
        默认0.5适合大多数打印机。
    "-V":
      name: "暗部强调"
      tooltip_title: "暗部强调 (-V)"
      tooltip_body: |-
        在色域的暗（阴影）区域添加额外色块。
        1.0 = 不强调（默认）。阴影表现复杂的打印机（如哑光
        艺术纸）可升到2.0〜3.0。
    "-l":
      name: "总墨量限制 (%)"
      tooltip_title: "总墨量限制 (-l)"
      tooltip_body: |-
        允许打印机往纸上铺的墨水总量上限（百分比）。100% = 一层
        满墨，200% = 两层满墨（如100C + 100K），以此类推。

        为什么重要（尤其是CMYK / CMYK+N）:
        没有限制时，targen会毫不犹豫地生成 100C + 100M + 100Y +
        100K = 400% 这样的色块。那么多湿墨会积墨、干得慢、出现
        斑驳，甚至撕裂纸张 — 而由这种色块生成的配置文件会预测
        打印机实际打不出的颜色。

        选值方法:
          • 多数CMYK喷墨:           260〜320%
          • 涂布纸/光面纸:          320〜360%
          • 新闻纸、低档纸:         220〜260%
          • 扩展色域（CMYKOGV）:    400〜500%（更多墨水分摊
                                              总预算）

        拿不准时，查打印机文档或纸张配置文件指南，或者实测:
        打印一小条墨量测试楔，选不渗墨且干净干燥的最大值。

        RGB流程: 通常保持禁用 — RGB喷墨在内部自行限墨，
        targen无需在通道间分配预算。

        勾选复选框以启用。
    "__targen_distribution__":
      name: "色块分布"
      tooltip_title: "色块分布 (-t / -r / -R / -q / -Q / -i / -I)"
      tooltip_body: |-
        targen如何决定把每个色块放在打印机色域的什么位置。
        不同算法在覆盖率、均匀度和速度之间有不同取舍。

        只选一个。它们互斥 — 选中任何一个都会完全取代默认的
        OFPS布局。

        OFPS（默认，推荐）:
        优化最远点采样。迭代地把每个新色块放在离所有已有色块
        尽可能远的地方，覆盖均匀度居各算法之首。比替代方案慢，
        但是配置文件质量的金标准。配合「彻底优化 (-G)」效果
        最佳。

        增量远点 (-t):
        更简单的最远点方法。比OFPS快，稍欠均匀。色块数极大、
        OFPS太慢且接受小幅质量下降时使用。

        随机 — 设备空间 (-r):
        在原始设备值（如RGB）中均匀随机布点。最快，但在「感知」
        颜色上覆盖不均 — 在人眼几乎分不出的区域浪费色块。

        随机 — 感知空间 (-R):
        在感知颜色（Lab）中均匀随机。必须用随机时比 -r 好，
        因为色块按人眼所见均匀分布。同等数量仍不如OFPS。

        准随机空间填充 (-q / -Q):
        低差异序列（类Sobol），比真随机填充更均匀，又没有OFPS
        的迭代开销。-q 在设备空间，-Q 在感知空间。OFPS太慢时
        的好折中。

        体心立方格 (-i / -I):
        固定规则格点（每个色块在立方体模式中被8个邻居包围）。
        确定性且非常均匀，但不灵活 — 能恰好填进格点的色块数
        有限。-i 在设备空间，-I 在感知空间。

        大多数用户应保持OFPS。
      labels:
        - "OFPS — 优化最远点（推荐）"
        - "增量远点 (-t)"
        - "随机 — 设备空间 (-r)"
        - "随机 — 感知空间 (-R)"
        - "准随机填充 — 设备空间 (-q)"
        - "准随机填充 — 感知空间 (-Q)"
        - "体心立方格 — 设备空间 (-i)"
        - "体心立方格 — 感知空间 (-I)"
    "-A":
      name: "OFPS适应度"
      tooltip_title: "OFPS适应度 (-A)"
      tooltip_body: |-
        OFPS为贴合预调节配置文件 (-c) 的形状而弯曲其均匀覆盖
        规则的程度。仅当色块分布为OFPS且设置了 -c 配置文件时
        才有意义。

        0.0 = 完全忽略配置文件 — 设备空间中的纯均匀覆盖，
              如同没给 -c。
        1.0 = 完全跟随配置文件 — 把色块集中到配置文件指出的
              打印机色域要紧之处（即实际色彩空间的形状）。

        targen的默认值在首轮为0.10（轻度），设置 -c 时为1.0；
        为避免行为突变的意外，除非你明确更改，ChromIQ保持0.10。

        在信任首个配置文件、希望第二张色卡密集采样打印机真实
        色域而非设备空间空角落的优化轮中，请向1.0调高。

        勾选复选框以启用。
    "-m":
      name: "立方体内部级数"
      tooltip_title: "立方体内部级数 (-m)"
      tooltip_body: |-
        在打印机色彩立方体「内部」添加规则的色块网格 — 每轴
        N级（RGB为N×N×N等）。这些色块是在你用 -f、-g、-s
        及其他计数器选定的色块「之外」额外放置的。

        设为0（默认）跳过 — 几乎总是正确选择。
        OFPS对立方体内部的覆盖已经更高效。

        何时使用:
          • 跨机器可重复性: 固定网格每次都相同，与targen挑了
            哪些OFPS位置无关，有助于跨运行对比配置文件。
          • 需要可预测、有名字的立方体位置的诊断色卡。

        使用时的典型值: 3〜6（每轴级数）。数字增长很快 —
        RGB的6级是216个色块，8级是512个。

        勾选复选框以启用。
    "-M":
      name: "立方体表面级数"
      tooltip_title: "立方体表面级数 (-M)"
      tooltip_body: |-
        在打印机色彩立方体「表面」添加规则的色块网格 — 每面
        N级。色块放在外侧（一次色、二次色、色域边缘），不在
        内部。

        设为0（默认）跳过。

        何时使用:
          • 想专门钉牢色域边界和一次/二次色的角，又不要
            -m 的内部开销。
          • 比较不同墨水/纸张如何改变色域外形 — 表面色块
            正是受影响最大的色块。

        使用时的典型值: 每面4〜8级。

        勾选复选框以启用。
    "-b":
      name: "体心立方级数"
      tooltip_title: "体心立方级数 (-b)"
      tooltip_body: |-
        在体心立方（BCC）格点上添加色块 — 比普通立方网格更密，
        因为在立方体角和中心都放点。N是每轴的细分数。

        设为0（默认）跳过 — 这是个小众旋钮。

        何时使用:
          • 想要规则、对齐格点的色块位置，且填充比 -m 更好，
            又不想一路用到OFPS。
          • 研究/可重复性场景，BCC结构本身就是目的。

        注: 这是「级数计数器」形式（往色块列表里加）；想让
        「整个」分布都是BCC的色卡，请用上面的「色块分布」
        选择器选体心立方选项。

        勾选复选框以启用。
  printtarg:
    "-i":
      name: "测量仪器"
      tooltip_title: "测量仪器 (-i)"
      tooltip_body: |-
        告诉色卡生成器你将用哪台分光光度计读取打印的色卡。
        色块网格围绕该仪器的色条宽度、色块尺寸和间距构建 —
        选对它至关重要。

          •  i1Pro / i1Pro 2 / i1Pro 3 — 手持色条读取器，最常见
             的选择。一次扫读一列色块。

          •  i1Pro 3 Plus — i1Pro 3的大孔径版本。读取更大的
             色块，每页放得少很多（约为普通i1Pro的1/5）。

          •  ColorMunki / i1Studio / ColorChecker Studio —
             入门级设备。单独使用时逐块读取；配上可选测量
             导轨可成对读取（见双倍密度）。

          •  SpectroScan — 平板XY扫描器。电动臂逐个读取色块，
             每页能容纳的颜色远超任何色条读取器。

          •  i1iSis（i1Profiler经由）— 自动馈纸式色卡读取器。
             ChromIQ无法直接驱动它: 而是会把色块列表与色卡
             一起保存为i1Profiler自己的格式，剩下的流程（打印、
             扫描、生成配置文件）在那边完成。此设备不使用
             ChromIQ的打印和测量标签页。

        选错仪器会生成设备无法对准或可靠读取的色卡 — 测量时
        会出现「找不到色块」或对位错误。引导模式下布局会自动
        适配这一选择。
      labels:
        - "i1Pro / i1Pro 2 / i1Pro 3"
        - "i1Pro 3 Plus"
        - "ColorMunki / i1Studio / ColorChecker Studio"
        - "SpectroScan（平板）"
        - "i1iSis（经i1Profiler）"
    "-h":
      name: "双倍密度"
      tooltip_title: "双倍密度 (-h)"
      tooltip_body: |-
        修改printtarg布局中每条色条的色块密度。具体含义取决于
        使用中的仪器:

          •  ColorMunki / i1Studio / ColorChecker Studio —
             把每条测量色条能容纳的色块数翻倍。必须有物理测量
             导轨配件；没有它设备无法对准更密的间距，会误读。

          •  SpectroScan — 把色卡布局从矩形切换为六边形色块。
             六边形铺得更密，每页约多放14%的色块。无需额外
             硬件。

        对i1Pro和i1Pro 3 Plus无效，选中它们时通常隐藏。
    "-p":
      name: "纸张尺寸"
      tooltip_title: "纸张尺寸 (-p)"
      tooltip_body: |-
        设置打印色卡每张纸的尺寸。色卡始终把页面填满到边 —
        纸越大放的色块越多，用更少的纸得到更精细的配置文件。

        选择你实际要打印的尺寸，包括方向。色条读取器（i1Pro
        系列）从上往下读，因此:

          •  纵向 — 色条更长但更少。标准选择。

          •  横向（A4R、LetterR、420×297…）— 色条更短但更多。
             当打印机横向进纸更可靠，或纵向纸会让最后一条离
             纸边太近时使用。

        没有匹配的具名尺寸时选「自定义」，以毫米输入精确的
        宽和高。

        改变纸张尺寸后，命令预览中的色块数和页数会自动更新。
      labels:
        - "A2 纵向 (420 × 594 mm)"
        - "A2 横向 (594 × 420 mm)"
        - "A3+ 纵向 (329 × 483 mm)"
        - "A3+ 横向 (483 × 329 mm)"
        - "A3 纵向 (297 × 420 mm)"
        - "A3 横向 (420 × 297 mm)"
        - "小报 / 11 × 17\""
        - "Legal (8.5 × 14\")"
        - "A4 纵向 (210 × 297 mm)"
        - "A4 横向 (297 × 210 mm)"
        - "信纸 纵向 (8.5 × 11\")"
        - "信纸 横向 (11 × 8.5\")"
        - "8×10\" (203 × 254 mm)"
        - "5×7\" (127 × 178 mm)"
        - "4×6\" (102 × 152 mm)"
        - "自定义（输入尺寸）"
    "-t":
      name: "TIFF输出DPI"
      tooltip_title: "TIFF分辨率 (-t)"
      tooltip_body: |-
        TIFF光栅色卡文件的输出分辨率。
        色条读取仪器推荐300 DPI，文件大小与色块清晰度兼顾良好。
        极大的色卡可用200 DPI减小文件。
        更高的值（600以上）很少需要，且产生大文件。
    "-L":
      name: "抑制左夹纸边条"
      tooltip_title: "抑制左夹纸边条 (-L)"
      tooltip_body: |-
        去掉左缘的夹纸边条，腾出约15mm的页宽放更多色块列。
        除非你使用物理压纸夹具，否则请启用。
        色块数据库的所有数值都假设此参数为开。
    "-a":
      name: "色块尺寸缩放"
      tooltip_title: "色块尺寸缩放 (-a)"
      tooltip_body: |-
        统一缩放色块和间隔条的尺寸。
        1.0为默认（针对仪器优化的尺寸）。
        在仪器需要更大测量面积的粗糙/带纹理纸张上可升到
        1.5〜2.0。
        低于1.0每页放更多色块，但在某些仪器上可能造成读取
        错误。
        注: 把此值改离默认后，会触发实时二分查找重算，而非
        快速查表。
    "-m":
      name: "页边距 (mm)"
      tooltip_title: "页边距 (-m / -M)"
      tooltip_body: |-
        以毫米设置可打印区域 (-m) 和TIFF文件尺寸 (-M) 的边距。
        两者保持同步。
        6mm与多数打印机的最小边距相符。仅当打印机支持无边距
        打印时才减小。

        选择 i1Pro / i1Pro 2 / i1Pro 3 / i1Pro 3 Plus 仪器会自动
        升到10mm，防止色条读取光学件滑到裸纸边上（「读到的
        色块不够」错误）。切换到 ColorMunki / SpectroScan 则回到
        6mm。自定义值（非6也非10）在切换仪器时保留。

        每页色块数查表只有6mm和10mm — 其他值触发实时二分
        查找重算。
    "-r":
      name: "保持色块顺序（不随机化）"
      tooltip_title: "不随机化 (-r)"
      tooltip_body: |-
        printtarg默认随机化色块位置以减少仪器漂移造成的伪差。
        仅当测试特定色块序列，或仪器要求有序色块时才启用
        此参数。
    "-b":
      name: "强制黑白间隔条"
      tooltip_title: "强制黑白间隔条 (-b)"
      tooltip_body: |-
        强制色条间的间隔条为黑/白而非彩色。
        不影响色块数和布局几何。

        「无间隔条」(-n) 启用时无效 — 此时本选项灰显并被
        排除出printtarg命令。
    "-P":
      name: "不限制色条长度"
      tooltip_title: "不限制色条长度 (-P)"
      tooltip_body: |-
        printtarg默认限制色条长度，确保每条都不溢出纸面。
        启用此参数会取消该限制，允许非常长的色条。
        适合窄幅卷筒纸，或希望给定色块数下色条尽可能少的
        情况。
        警告: 色块数很大时色条可能伸出纸边 — 打印前请核对
        生成的TIFF。
    "-N":
      name: "N通道TIFF（5墨以上）"
      tooltip_title: "N通道TIFF (-N)"
      tooltip_body: |-
        对超过4个墨水通道的打印机（如CMYK加额外专色），标准
        TIFF最多支持4通道。此参数让printtarg用TIFF的Alpha通道
        槽位编码额外通道，把所有墨水值保存在一个文件中。

        仅当打印机驱动或RIP期待多通道TIFF时启用。标准RGB或
        CMYK配置文件制作不需要此选项。
    "-K":
      name: "应用校准文件"
      tooltip_title: "将校准应用到色块 (-K)"
      tooltip_body: |-
        当打印机没有内置校准机制 — 即打印机驱动或RIP无法自行
        应用校准曲线 — 时使用。

        先运行Argyll的printcal，生成描述如何线性化打印机的
        .cal 文件。再把它传到这里: printtarg在生成色卡前把每个
        色块颜色值都经校准曲线重新映射，打印出的目标因此一开始
        就反映校准后的设备行为。
        .cal 也会嵌入 .ti2 文件，供colprof生成ICC配置文件时
        引用。

        典型用途: 没有内置线性化、不经RIP直接由TIFF驱动的
        桌面喷墨打印机。

        与「包含校准文件」(-I) 互斥 — 同一时间只能启用一个
        校准选项。
    "-I":
      name: "包含校准文件（不应用）"
      tooltip_title: "包含校准但不应用 (-I)"
      tooltip_body: |-
        当打印机或RIP本身已原生应用校准曲线时使用 — 例如带
        自有线性化LUT的生产型喷墨RIP，或内置密度校准的打印机。

        这种情况下你不希望printtarg重新映射色块值（打印机自己
        处理），但希望colprof知道这份校准。-I 把 .cal 文件仅作为
        元数据嵌入 .ti2 输出，色块值原封不动。

        典型用途: 专业喷墨RIP（如EFI Fiery、Wasatch、ColorBurst）
        或在配置文件打印期间生效的内置线性化打印机。

        与「应用校准文件」(-K) 互斥 — 同一时间只能启用一个
        校准选项。
    "-C":
      name: "禁用TIFF压缩"
      tooltip_title: "禁用TIFF压缩 (-C)"
      tooltip_body: |-
        输出未压缩的TIFF文件，而非默认的LZW压缩。
        未压缩文件更大，但与所有RIP和打印机驱动通用兼容。
        打印流程拒绝或损坏压缩TIFF时启用。
    "-D":
      name: "16位抖动至8位"
      tooltip_title: "抖动8位输出 (-D)"
      tooltip_body: |-
        生成8位TIFF时，用误差扩散抖动从内部16位精度下采样。
        减少平滑渐变中本会由量化造成的条带。
        仅在选择8位TIFF输出时有效。
    "-U":
      name: "抑制CUPS色彩管理头"
      tooltip_title: "抑制CUPS CMM头 (-U)"
      tooltip_body: |-
        从PostScript和EPS输出文件中移除「cupsJobTicket:
        cups-disable-cmm」注释。不同版本的CUPS对此注释反应
        不同。
        此选项只影响PS/EPS输出，对TIFF文件无效。仅在打印
        过程中出现意外色彩管理时启用。
    "-R":
      name: "随机化种子"
      tooltip_title: "随机化种子 (-R)"
      tooltip_body: |-
        设置色块随机化算法的起始种子。
        相同种子加相同色块数总产生相同的色块布局，色卡完全
        可重现。
        适合研究，或日后需要重新生成完全相同的色卡。
        「保持色块顺序」(-r) 启用时无效。
    "-Q":
      name: "量化位数"
      tooltip_title: "量化色块值 (-Q)"
      tooltip_body: |-
        生成色卡前把所有色块颜色值舍入到指定位深。例如 -Q 8
        把所有值舍入到8位（256级）精度。
        当打印管线在特定位深出现条带、你想恰好在那个精度
        测试时使用。
    "-A":
      name: "仅间隔条缩放"
      tooltip_title: "仅间隔条缩放 (-A)"
      tooltip_body: |-
        只对间隔条施加额外的缩放系数，不改变 -a 设定的色块
        尺寸。
        大于1.0让间隔条更宽；小于1.0更窄。适合色条之间需要
        更多分隔的仪器，或想保持色块尺寸不变、靠收窄间隔条
        腾出空间的情况。

        「无间隔条」(-n) 启用时无效 — 此时本选项灰显并被
        排除出printtarg命令。
    "-n":
      name: "无间隔条"
      tooltip_title: "无间隔条 (-n)"
      tooltip_body: |-
        移除色块和色条之间的所有间隔条。间隔条通常帮助仪器
        识别色条边界和方向。
        仅当测量流程明确不依赖它们（如某些平板扫描仪环境）
        才禁用。

        启用后，「强制黑白间隔条」(-b) 和「仅间隔条缩放」(-A)
        会自动禁用，因为两者都只影响间隔条。
    "-c":
      name: "强制彩色间隔条"
      tooltip_title: "强制彩色间隔条 (-c)"
      tooltip_body: |-
        强制色块间的间隔区域以彩色渲染，而非默认（可能按仪器
        配置为黑/白）。在黑色间隔条相对暗色块对比不足的部分
        彩色喷墨设备上，可改善色条识别。
  chartread:
    "-B":
      name: "禁用双向色条识别"
      tooltip_title: "禁用双向读取 (-B)"
      tooltip_body: |-
        阻止chartread自动检测色条是正向还是反向扫描的。ChromIQ
        默认关闭此项，让仪器可以双向读取色条。

        仅当测量中仪器报告误判的色条方向错误时才打开。
    "-b":
      name: "强制双向色条识别"
      tooltip_title: "强制双向读取 (-b)"
      tooltip_body: |-
        强制chartread接受任一方向扫描的色条。

        通常chartread只在随机化的色卡上自动检测色条方向；
        固定顺序的色卡只读一个方向，反向扫描的色条被拒绝。
        打开此项可不论色卡如何都强制检测 — 对能双向读取的
        i1 Pro系列很有用。它与 -B 相反，二者只能取其一。
    "-S":
      name: "抑制警告消息"
      tooltip_title: "抑制警告 (-S)"
      tooltip_body: |-
        抑制chartread的非致命测量警告对话框。
        推荐用于无人值守或批量测量。
        会阻止配置文件生成的错误仍会报告。
    "-N":
      name: "禁用初始校准"
      tooltip_title: "禁用初始校准 (-N)"
      tooltip_body: |-
        跳过启动时仪器在白色基准板上的自动校准。
        仅当本次会话已校准过仪器、想不重新校准就测量更多
        色卡时使用。
    "-p":
      name: "逐块模式"
      tooltip_title: "逐块模式 (-p)"
      tooltip_body: |-
        从色条读取切换到单色块测量。
        适合手持单点测量，或某种纸上色条读取失败的情况。
        大色卡会明显变慢。
    "-H":
      name: "高分辨率光谱模式"
      tooltip_title: "高分辨率光谱 (-H)"
      tooltip_body: |-
        在支持的仪器（如i1Pro 2/3）上启用高分辨率光谱采样。
        Lab值更准确，但测量时间略增。
    "-T":
      name: "色块一致性容差"
      tooltip_title: "色块容差系数 (-T)"
      tooltip_body: |-
        乘在chartread内置色块一致性阈值上的系数 — 不是ΔE值。
        chartread会复读每个色块，并拒绝读数差异超过「阈值 ×
        此数」的色条。

        越低越严格。严格的设置能尽早发现真正的问题: 喷嘴堵塞、
        墨量不足、硒鼓辊脏污、激光碳粉漂移。健康的打印机 +
        分光光度计组合上，默认0.7留有充足余量；
        printerknowledge.com上的资深用户用i1 Pro 2 / 3时取0.4。

        在纹理纸、哑光纸或艺术纸上误报「色块不一致」时升到
        0.8〜1.5 — 那里纸面本身就带来真实差异。超过2的值大多
        只是掩盖真问题；需要那么高的话，先把打印机修好。
    "-l":
      name: "保存D50 L*a*b*值"
      tooltip_title: "保存L*a*b*而非XYZ (-l)"
      tooltip_body: |-
        把测量数据保存为D50 L*a*b*值而非XYZ。
        多数流程使用XYZ（默认）。仅当下游工具明确要求L*a*b*
        输入时才启用。
    "-X":
      name: "色度计校正矩阵"
      tooltip_title: "色度计校正矩阵 (-X)"
      tooltip_body: |-
        应用色度计校正矩阵（.ccmx）或校准光谱集（.ccss），
        提升色度计精度。
        只对色度计有意义（分光光度计无需）。
        正确的文件向仪器厂商索取，或用ArgyllCMS的ccss/ccmx
        工具自行创建。
  colprof:
    "-D":
      name: "配置文件描述"
      tooltip_title: "配置文件描述 (-D)"
      tooltip_body: |-
        嵌入ICC配置文件的名称 — 显示在Photoshop、Lightroom和
        预览等应用的色彩管理菜单中。

        用一致的格式标出打印机、纸张、墨水类型和日期，日后
        就容易找到正确的配置文件:

          打印机 · 纸张 · 墨水类型 · 日期
          例如 "Epson P900 · Canson Baryta · Chromatic · 2026-04"

        输出文件按 .ti3 文件命名 — 用下划线代替空格，让文件名
        与描述保持一致:
          例如 EpsonP900_CansonBaryta_Chromatic_2026-04.icc
    "-a":
      name: "配置文件算法"
      tooltip_title: "配置文件算法 (-a)"
      tooltip_body: |-
        选择颜色变换算法:
        • Lab cLUT (-al): 打印机配置文件的最佳精度。
          使用L*a*b*空间的完整3D查找表。推荐。
        • XYZ cLUT (-ax): 与Lab类似但在XYZ空间。
          有时中性渐变更平滑。
        • 矩阵/伽马 (-ag, -as): 更简单的模型，对复杂的打印机
          行为精度更低，但计算更快。
        首次RGB打印机配置文件请一律用Lab cLUT (-al)。
      labels:
        - "l — Lab cLUT（RGB打印机推荐）"
        - "x — XYZ cLUT"
        - "X — XYZ cLUT（绝对）"
        - "g — 伽马 + 矩阵（快，精度低）"
        - "G — 伽马 + 矩阵（强制）"
        - "s — 单伽马 + 矩阵"
        - "S — 单伽马 + 矩阵（强制）"
        - "m — 仅矩阵"
        - "M — 仅矩阵（强制）"
    "-q":
      name: "配置文件质量"
      tooltip_title: "配置文件质量 (-q)"
      tooltip_body: |-
        控制cLUT网格分辨率与平滑迭代次数:
        • 低: 17³网格 — 快速测试，不用于生产
        • 中: 33³网格 — 平衡好，推荐默认
        • 高: 45³网格 — 生产级质量
        • 超高: 65³网格 — 最高精度，非常慢
        多数喷墨工作用中等质量足够。
        艺术微喷或合同打样用高。
      labels:
        - "l — 低（快，约30秒）"
        - "m — 中（推荐，约2分钟）"
        - "h — 高（约10分钟）"
        - "u — 超高（约30分钟以上）"
    "-b":
      name: "B2A表质量"
      tooltip_title: "B2A表质量 (-b)"
      tooltip_body: |-
        独立控制输入（如屏幕软打样）变换所用B2A（设备→PCS）
        表的质量。
        留空则匹配主 -q 质量设置。
        用「n」省略B2A表，减小配置文件体积（输出专用的
        配置文件不需要B2A）。
      labels:
        - "与配置文件质量相同（默认）"
        - "l — 低"
        - "m — 中"
        - "h — 高"
        - "u — 超高"
        - "n — 无（省略B2A表）"
    "-r":
      name: "平滑 / 设备噪声 (% ΔE)"
      tooltip_title: "平均设备噪声 (-r)"
      tooltip_body: |-
        估计的平均测量或设备噪声（占ΔE的百分比）。值越高
        配置文件平滑越强，离群色块的影响越小。
        • 0.5%: 干净的测量、保养良好的打印机
        • 1.0〜2.0%: 噪声较多的测量或纹理纸
        • 3.0〜5.0%: 噪声很大；平滑明显加强
    "-s":
      name: "色域映射源（感知）"
      tooltip_title: "感知色域映射源 (-s)"
      tooltip_body: |-
        用于计算感知渲染意图色域映射表（A2B / B2A感知）的源
        ICC配置文件。
        没有它，感知意图直接使用比色数据（无色域压缩）。
        通常设为AdobeRGB或ProPhoto RGB等标准RGB工作空间。
        .icc 和 .icm 都接受 — ICM只是Microsoft对ICC配置文件
        格式的叫法，两者相同。
    "-S":
      name: "色域映射源（感知 + 饱和度）"
      tooltip_title: "感知 + 饱和度源 (-S)"
      tooltip_body: |-
        与 -s 类似，但把色域映射同时应用于感知和饱和度两个
        渲染意图。
    "-A":
      name: "制造商"
      tooltip_title: "制造商字符串 (-A)"
      tooltip_body: |-
        嵌入ICC配置文件头的制造商字符串。
        可选 — 用于在配置文件选择界面中识别。
    "-M":
      name: "型号"
      tooltip_title: "型号字符串 (-M)"
      tooltip_body: |-
        嵌入ICC配置文件头的型号字符串。
    "-C":
      name: "版权"
      tooltip_title: "版权字符串 (-C)"
      tooltip_body: |-
        嵌入ICC配置文件的版权声明。
    "-ni":
      name: "无输入整形曲线"
      tooltip_title: "无输入整形曲线 (-ni)"
      tooltip_body: |-
        禁用在3D cLUT之前预处理设备值的1D输入整形（色调）
        曲线。这些曲线通常能提升配置文件精度。仅诊断时禁用。
    "-no":
      name: "无输出整形曲线"
      tooltip_title: "无输出整形曲线 (-no)"
      tooltip_body: |-
        禁用作用于3D cLUT之后的1D输出整形曲线。
        仅诊断时禁用。
    "-V":
      name: "暗部网格强调"
      tooltip_title: "暗部网格强调 (-V)"
      tooltip_body: |-
        在暗（阴影）区域添加额外的cLUT网格点。
        1.0 = 均匀网格（默认）。阴影表现复杂或黑场糊死的
        打印机可升到1.5〜2.0。
  profcheck:
    "-v":
      name: "详细程度"
      tooltip_title: "详细程度 (-v)"
      tooltip_body: |-
        逐块模式输出每个色块各自的ΔE值，这是色条级分析和
        引导优化的必需项。摘要模式只显示平均和峰值误差。
      labels:
        - "2 — 逐块（色条分析必需）"
        - "1 — 仅摘要"
    "-I":
      name: "渲染意图"
      tooltip_title: "渲染意图 (-I)"
      tooltip_body: |-
        「绝对比色」检验含白点在内的绝对颜色精度 — 打印机
        配置文件制作的标准。
        「相对比色」归一化到纸张白点。
      labels:
        - "a — 绝对比色（默认）"
        - "r — 相对比色"
    "-s":
      name: "色块按ΔE排序（最差在前）"
      tooltip_title: "按ΔE排序 (-s)"
      tooltip_body: |-
        把profcheck的输出排序，使表现最差的色块排在最前。
        便于快速定位问题区域。
        仅详细程度为逐块时有效。
    "-i":
      name: "光源"
      tooltip_title: "光源 (-i)"
      tooltip_body: |-
        选择把光谱测量转换为颜色值时使用的光源。仅当 .ti3
        含光谱数据时有意义。D50是打印配置文件制作的标准。
      labels:
        - "D50（默认）"
        - "D50M2（D50 + UV滤镜）"
        - "D65（日光 6500 K）"
        - "A（钨丝/白炽灯）"
        - "C（日光模拟，旧式）"
        - "F5（荧光灯 CWF）"
        - "F8（荧光灯 D50模拟）"
        - "F10（荧光灯 Ultralume）"
    "-o":
      name: "CIE观察者"
      tooltip_title: "CIE观察者 (-o)"
      tooltip_body: |-
        定义测色计算的标准观察者模型。
        1931 2°观察者是打印配置文件制作的ICC标准。
        没有特别要求请保持默认。
      labels:
        - "1931 2°（默认）"
        - "1964 10°"
        - "2015 2°（Stockman）"
        - "2015 10°（Stockman）"
        - "Shaw & Fairchild"
    "-P":
      name: "剔除离群色块（ΔE ≤）"
      tooltip_title: "把.ti3精简到ΔE ≤ (-P)"
      tooltip_body: |-
        创建 .ti3 文件的精简副本，只包含颜色误差不超过你设定
        阈值的色块。
        当少数测坏的色块拖累配置文件时很有用。
        启用此选项并设置可接受的最大ΔE值。
    "-w":
      name: "创建X3DOM 3D可视化"
      tooltip_title: "X3DOM可视化 (-w)"
      tooltip_body: |-
        生成配置文件颜色误差的交互式3D HTML可视化。
        用任何现代浏览器打开生成的 .x3d.html，即可探索色域中
        哪些部分误差最大。
  printcal:
    "-v":
      name: "详细程度"
      tooltip_title: "详细程度 (-v)"
      tooltip_body: |-
        控制校准过程中printcal输出多少内容。
          0 = 无输出
          1 = 基本进度（默认）
          2 = 逐通道详细信息
          3 = 调试输出
    "-s":
      name: "曲线平滑"
      tooltip_title: "曲线平滑 (-s)"
      tooltip_body: |-
        控制对校准曲线施加多少额外平滑。值越高曲线越平滑，
        但越不精确。

        默认: 1.0 — 适合大多数打印机。
        打印机色调响应有噪声、或校准曲线看起来锯齿状时
        调高（如2.0〜5.0）。
    "-z":
      name: "曲线分辨率"
      tooltip_title: "曲线分辨率 (-z)"
      tooltip_body: |-
        输出校准曲线表的级数。
        值越高分辨率越细，但 .cal 文件越大。
        默认（256）适合几乎所有打印机。
    "-A":
      name: "制造商"
      tooltip_title: "制造商 (-A)"
      tooltip_body: |-
        设置嵌入 .cal 文件的制造商描述。
        纯信息性 — 不影响校准曲线。
    "-M":
      name: "型号"
      tooltip_title: "型号 (-M)"
      tooltip_body: |-
        设置嵌入 .cal 文件的打印机型号描述。
        纯信息性 — 不影响校准曲线。
    "-D":
      name: "描述"
      tooltip_title: "描述 (-D)"
      tooltip_body: |-
        设置嵌入 .cal 文件的人类可读描述。
        纯信息性 — 不影响校准曲线。
    "-C":
      name: "版权"
      tooltip_title: "版权 (-C)"
      tooltip_body: |-
        设置嵌入 .cal 文件的版权字符串。
        纯信息性 — 不影响校准曲线。
  applycal:
    "-v":
      name: "详细"
      tooltip_title: "详细 (-v)"
      tooltip_body: |-
        显示所应用校准的详细信息，包括逐通道曲线统计。
