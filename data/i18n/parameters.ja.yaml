# Japanese overlay for data/parameters.yaml — merged in translate_parameters()
parameters:
  targen:
    "-d":
      name: "デバイスタイプ"
      tooltip_title: "デバイスタイプ (-d)"
      tooltip_body: |-
        出力デバイスの色材構成を定義します。

        印刷の色空間は減法混色です: デバイス値 0 = 白（インクなし）、
        最大 = 黒（インク全量）。ビデオ/ディスプレイの色空間は加法
        混色です: デバイス値 0 = 黒、最大 = 白。

        一般的な選択:
          • 印刷グレー (-d 0)  — 単一チャンネルのグレースケールプリンター
          • ビデオグレー (-d 1) — 単一チャンネルのディスプレイ/モニター
          • 印刷RGB (-d 2)     — 標準のRGBインクジェット（デフォルト、推奨）
          • ビデオRGB (-d 3)   — RGBディスプレイ/モニター
          • CMYK (-d 4)        — 4色インクジェットまたはオフセット印刷機
          • CMY (-d 5)         — 3色、独立した黒チャンネルなし

        オプション6〜15は、追加インク（ライトシアン/マゼンタ、オレンジ、
        グリーン、バイオレットなど）を持つ特殊なマルチチャンネル
        インクジェット用です。必要なら -D（エキスパート）で色材セットを
        微調整してください。
      labels:
        - "印刷グレー"
        - "ビデオグレー"
        - "印刷RGB（推奨）"
        - "ビデオRGB"
        - "CMYK"
        - "CMY"
        - "CMYK + ライトCM"
        - "CMYK + ライトCMK"
        - "CMYK + 赤 + 青"
        - "CMYK + 橙 + 緑"
        - "CMYK + 赤 + 緑 + 青"
        - "CMYK + 橙 + 緑 + 紫"
        - "CMYK + 橙 + 緑 + 青"
        - "CMYK + ライトCMK + ライトライトK"
        - "CMYK + 橙 + 緑 + ライトCM"
        - "CMYK + ライトCM + ミディアムCM"
    "-D":
      name: "色材の追加/削除"
      tooltip_title: "色材の追加/削除 (-D)"
      tooltip_body: |-
        デバイスタイプ (-d) で定めた色材セットを、色材1つの追加または
        削除で変更します。選んだ色材が既にセットにあれば削除され、
        なければ追加されます。

        典型的な用途:
          • 標準CMYKにオレンジ (-D 5) を加えて色域を拡張
          • CMYKにライトシアン (-D 11) / ライトマゼンタ (-D 12) を
            加えてハイライトの階調を滑らかに

        複数のスロットを有効にすると色材を積み重ねられます（有効に
        するたびに次のスロットが現れ、最大11個まで変更可能）。

        標準のデバイスタイプ0〜5では無効のままにしてください。
      labels:
        - "加法"
        - "シアン"
        - "マゼンタ"
        - "イエロー"
        - "ブラック"
        - "オレンジ"
        - "レッド"
        - "グリーン"
        - "ブルー"
        - "バイオレット"
        - "ホワイト"
        - "ライトシアン"
        - "ライトマゼンタ"
        - "ライトイエロー"
        - "ライトブラック"
        - "ミディアムシアン"
        - "ミディアムマゼンタ"
        - "ミディアムイエロー"
        - "ミディアムブラック"
        - "ライトライトブラック"
    "-f":
      name: "総パッチ数"
      tooltip_title: "総パッチ数 (-f)"
      tooltip_body: |-
        色パッチの総数を設定します。パッチが多いほどプロファイル精度は
        上がりますが、印刷と測定の時間が長くなります。
        RGBインクジェットの典型的な範囲:
          • クイックテスト: 400〜600
          • 標準:           800〜1200
          • 高品質:         1500〜2000
          • 最高品質:       2500〜3000

        自動（スピンボックスの隣）: チェックすると、選択した用紙、
        測定器、ダブルデンシティ、左余白、パッチスケール、マージン、
        そしてprinttargセクションのページ数スピンボックスから、パッチ数を
        リアルタイムに計算します — ちょうどその枚数を空きなく埋める
        最大値が選ばれます。自動がオンの間スピンボックスはグレー表示で、
        現在の推定値を表示します。カスタムレイアウト（デフォルト以外の
        パッチスケールやマージン）では、自動はtargenに対する短い二分
        探索を実行するため、値の更新に1秒ほどかかることがあります。

        ガイドモードでは、1ページあたりのパッチ数データベース × 選択した
        ページ数から自動計算されます。
        ガイドモードで自動計算を使うには0に設定してください。
    "-e":
      name: "白パッチ"
      tooltip_title: "白パッチ (-e)"
      tooltip_body: |-
        チャートに加える純粋な紙白パッチの数です。測定器はこれを測って
        用紙がどれだけ白いかを正確に学び、プロファイルの明部側の基準に
        します。4が良いデフォルトです。強い光沢紙ではもう少し多くすると
        効果があります。

        自動（チェックボックス）:
        「自動」をオンにすると、チャート全体のパッチ数に基づいて
        ChromIQがこの数を選びます — 小さな1ページのチャートには少なめ、
        大きな複数ページのチャートには多めの白パッチが、考えなくても
        設定されます。

        自動の数の決め方:
          • 約560パッチのチャートには白パッチ4個。
          • チャートがおよそ2倍になるたびに、数は50%増えます
            （4 → 6 → 8 …）。
          • 8を超えることはなく（それ以上はスペースの無駄）、
            2を下回ることもありません。

        自動がオンの間、このボックスはグレー表示で「自動」と表示
        されます。いつでもオフにして自分の数を入力できます。
    "-B":
      name: "黒パッチ"
      tooltip_title: "黒パッチ (-B)"
      tooltip_body: |-
        チャートに加える最大インク量（デバイス黒）パッチの数です。
        測定器はこれを測ってプリンターが出せる最も暗いトーンを学び、
        プロファイルのシャドウ側の基準にします。RGBプリンターには
        4が良いデフォルトです。

        自動（チェックボックス）:
        「自動」をオンにすると、チャート全体のパッチ数に基づいて
        ChromIQがこの数を選びます — 小さなチャートには少なめ、
        大きなチャートには多めの黒パッチが設定されます。

        自動の数の決め方:
          • 約560パッチのチャートには黒パッチ4個。
          • チャートがおよそ2倍になるたびに、数は50%増えます
            （4 → 6 → 8 …）。
          • 8を超えることも2を下回ることもありません。

        自動がオンの間、このボックスはグレー表示で「自動」と表示
        されます。いつでもオフにして自分の数を入力できます。
    "-g":
      name: "グレー軸ステップ"
      tooltip_title: "グレー軸ステップ (-g)"
      tooltip_body: |-
        白から黒まで均等に置かれる追加のニュートラルグレーパッチです。
        プロファイルがグレーを色かぶりなくきれいに再現するのを助けます —
        白黒写真とニュートラルなトーンに重要です。
        手で設定する場合の目安: クイックなプロファイルは0、
        標準は50〜100、高品質は128以上。

        自動（チェックボックス）:
        「自動」をオンにすると、チャート全体のパッチ数に応じて
        ChromIQがこの数を選びます — 大きなチャートほど長く細かい
        グレーランプになります。

        自動の数の決め方:
          • 約560パッチのチャートにはグレー32ステップ。
          • チャートがおよそ2倍になるたびに、ステップも2倍に
            なります（32 → 64 → 128）。
          • 128を超えることも8を下回ることもありません。

        自動がオンの間、このボックスはグレー表示で「自動」と表示
        されます。いつでもオフにして自分の数を入力できます。

        （ガイドモードは常に同じ考え方で自動設定します。）
    "-G":
      name: "入念な最適化（遅い）"
      tooltip_title: "入念な最適化 (-G)"
      tooltip_body: |-
        targenに余分な時間をかけさせ、プリンターの色域全体にできる
        だけ均等にパッチを配置させます。パッチセットの種類はどちらでも
        同じ（OFPS — 最適化最遠点サンプリング、デフォルトの分布）で、
        これは「高速」モードを「良質」モードに切り替えるだけです。

        実際に印刷して測定するチャートにはオンを推奨します: チャート
        生成時に数秒余分にかかるだけで、測定可能なほど良いプロファイル
        が得られます。

        チャート設定を素早く試行錯誤していて、パッチの質の絶対値を
        気にしない場合のみオフにしてください（例: 最終チャートを確定
        する前の印刷レイアウトのテスト）。

        「パッチ分布」がOFPS以外に設定されているときは効果がありません
        — 代替の分布（ランダム、準ランダム、体心立方など）はこの
        フラグを無視します。
    "-s":
      name: "単一チャンネルステップ"
      tooltip_title: "単一チャンネルステップ (-s)"
      tooltip_body: |-
        単一チャンネルのランプパッチ（R、G、Bを個別に）を追加します。
        個々のインクの挙動を特性化するのに便利です。
        典型値: クイックは0、標準は20〜50、高品質は50〜100。
    "-c":
      name: "プレコンディショニング"
      tooltip_title: "プレコンディショニングプロファイル (-c)"
      tooltip_body: |-
        このプリンター/用紙の組み合わせの既存ICCプロファイルで、
        パッチ分布を知覚空間でプレコンディショニングするのに使います。
        ここで以前のプロファイルを使うと、出力色域により均等に分布した
        パッチが生成され、2回目のプロファイル作成パスでより高い精度に
        つながります。初めてのプロファイルでは空欄にしてください。
    "-C":
      name: "キャリブレーション上書き"
      tooltip_title: "キャリブレーション上書き (-C)"
      tooltip_body: |-
        パッチ生成のインク制限を推定する際に、そのキャリブレーション
        カーブを適用するオプションの .cal ファイルです。以前のプロファイル
        作成パスで生成されたICCターゲット .ti3 に埋め込まれた .cal を
        上書きします。

        検証済みのデバイスキャリブレーション（printcal/applycal由来など）
        があり、シャドウ領域に必要なパッチ数の計算でtargenにそれを考慮
        させたいときに使ってください。

        フィールドに「none」と入力（引用符なし）すると、.ti3 に埋め
        込まれていても .cal の使用を明示的に防げます。

        ほとんどのワークフローでは空欄に — プロファイルとは独立に
        キャリブレーションカーブを管理している場合のみ必要です。
    "-n":
      name: "ニュートラル軸ステップ"
      tooltip_title: "ニュートラル軸ステップ (-n)"
      tooltip_body: |-
        -c で読み込んだプレコンディショニングICCプロファイルが定義する、
        プリンター + 用紙の知覚的に正しいニュートラル軸に沿って、追加の
        ウェッジパッチを置きます。

        -g（グレー軸ステップ）との違い:
          • -g はRGBデバイス値（R = G = B）を歩きます: 0/0/0、32/32/32、
            64/64/64 … これは等しいデバイス値がニュートラルグレーで
            印刷される前提で、完全にリニアライズされたプリンターでしか
            成り立ちません。実際のプリンターでは「デバイスグレーランプ」
            にはたいてい色かぶりがあります。
          • -n は指定プロファイルに尋ねます:「このプリンターが各明度
            ステップでニュートラルなL*a*b*（a* = b* = 0）パッチを再現
            するのに実際に必要なRGB値は？」その（通常は等しくない）
            RGB値がパッチとして追加されます。

        -N（ニュートラル軸の強調）との違い:
          • -N は既存のOFPSパッチ分布をニュートラル領域へ偏らせる
            0〜1のダイヤルです。名前付きのステップは追加しません。
          • -n は、残りの分布が生むものに加えて、プロファイル由来の
            明示的なニュートラルパッチを追加します。

        使いどき:
          • この用紙の1回目のICCプロファイルが既にあり、改良チャートを
            作っている場合。そのプロファイルをプレコンディショニング
            プロファイル (-c) に読み込み、-n を32〜64にして補正済み
            ニュートラル軸を密に特性化します。
          • -c なしの初回チャートでは0のままに — プレコンディショニング
            プロファイルがなければサンプリングすべき「真の」ニュートラル
            軸が存在せず、デバイス空間のランプは -g が既にカバーします。

        改良時の典型値: 通常の作業は32、ニュートラル性がクリティカルな
        ファインアート/校正は64。

        -c の設定が必須です。なければ効果がありません。
    "-N":
      name: "ニュートラル軸の強調"
      tooltip_title: "ニュートラル軸の強調 (-N)"
      tooltip_body: |-
        パッチがニュートラル軸付近にどれだけ強く集まるかを制御します。
        0.0 = 強調なし、1.0 = グレー付近への最大の集中。
        デフォルトの0.5はほとんどのプリンターに適切です。
    "-V":
      name: "暗部の強調"
      tooltip_title: "暗部の強調 (-V)"
      tooltip_body: |-
        色域の暗い（シャドウ）領域にパッチを追加します。
        1.0 = 強調なし（デフォルト）。シャドウの挙動が複雑なプリンター
        （マットのファインアート紙など）では2.0〜3.0に上げてください。
    "-l":
      name: "総インク制限 (%)"
      tooltip_title: "総インク制限 (-l)"
      tooltip_body: |-
        プリンターが紙に載せてよいインクの総量の上限（パーセント）です。
        100% = インク1層分、200% = 2層分（例: 100C + 100K）、以下同様。

        なぜ重要か（特にCMYK / CMYK+N）:
        制限がないと、targenは平気で 100C + 100M + 100Y + 100K = 400%
        のようなパッチを生成します。それほど大量の濡れたインクは溜まり、
        乾きが遅く、ムラになり、紙を破ることさえあります — そして
        そうしたパッチから作られたプロファイルは、プリンターが実際には
        出せない色を予測します。

        値の選び方:
          • ほとんどのCMYKインクジェット:  260〜320%
          • コート紙/光沢紙:               320〜360%
          • 新聞紙、低品質紙:              220〜260%
          • 拡張色域（CMYKOGV）:           400〜500%（より多くのインクで
                                           総予算を分け合う）

        不確かなら、プリンターの説明書や用紙プロファイルのガイドを
        確認するか、実測してください: 小さなインク制限テストウェッジを
        印刷し、にじまずきれいに乾く最大値を選びます。

        RGBワークフロー: 通常は無効のままに — RGBインクジェットは内部で
        独自にインク制限を行うため、targenがチャンネル間で予算を配分する
        必要はありません。

        有効にするにはチェックボックスをオンに。
    "__targen_distribution__":
      name: "パッチ分布"
      tooltip_title: "パッチ分布 (-t / -r / -R / -q / -Q / -i / -I)"
      tooltip_body: |-
        プリンターの色域のどこに各色パッチを置くかをtargenがどう決めるか
        です。アルゴリズムごとに、カバレッジ・均等さ・速度のトレードオフ
        が異なります。

        1つだけ選んでください。これらは相互排他的です — どれかを選ぶと
        デフォルトのOFPS配置を完全に置き換えます。

        OFPS（デフォルト、推奨）:
        最適化最遠点サンプリング。新しいパッチを既存のすべてのパッチから
        できるだけ遠くに反復配置し、ここにあるどのアルゴリズムよりも
        均等なカバレッジを生みます。代替より遅いですが、プロファイル品質
        のゴールドスタンダードです。最良の結果には「入念な最適化 (-G)」
        と組み合わせてください。

        増分遠点 (-t):
        よりシンプルな最遠点方式。OFPSより速く、わずかに不均等。
        非常に大きなパッチ数でOFPSが遅すぎ、小さな品質低下を受け入れる
        場合に。

        ランダム — デバイス空間 (-r):
        生のデバイス値（RGBなど）で一様ランダムなパッチ。最速ですが、
        「知覚される」色でのカバレッジが不均等です — 目がほとんど区別
        できない領域でパッチを浪費します。

        ランダム — 知覚空間 (-R):
        知覚色（Lab）で一様ランダム。ランダムを使わざるを得ないなら
        -r より良い選択です。目が見るものに沿ってパッチが均等に
        広がるからです。それでも同数ならOFPSより劣ります。

        準ランダム空間充填 (-q / -Q):
        OFPSの反復コストなしに、真のランダムより均等に空間を埋める
        低食い違い列（Sobol系）。-q はデバイス空間、-Q は知覚空間。
        OFPSが遅すぎるときの良い中間解です。

        体心立方格子 (-i / -I):
        固定の規則格子（各パッチが立方体パターンで8つの近傍に囲まれる）。
        決定的で非常に均等ですが柔軟性がなく、格子に収まる正確なパッチ数
        は限られます。-i はデバイス空間、-I は知覚空間。

        ほとんどのユーザーはOFPSのままにすべきです。
      labels:
        - "OFPS — 最適化最遠点（推奨）"
        - "増分遠点 (-t)"
        - "ランダム — デバイス空間 (-r)"
        - "ランダム — 知覚空間 (-R)"
        - "準ランダム充填 — デバイス空間 (-q)"
        - "準ランダム充填 — 知覚空間 (-Q)"
        - "体心立方格子 — デバイス空間 (-i)"
        - "体心立方格子 — 知覚空間 (-I)"
    "-A":
      name: "OFPS適応"
      tooltip_title: "OFPS適応 (-A)"
      tooltip_body: |-
        OFPSがプレコンディショニングプロファイル (-c) の形に沿うため、
        均等カバレッジのルールをどれだけ曲げるかです。パッチ分布が
        OFPSで、かつ -c プロファイルが設定されているときのみ意味が
        あります。

        0.0 = プロファイルを完全に無視 — -c がないかのような、デバイス
              空間での純粋な均等カバレッジ。
        1.0 = プロファイルに完全に従う — プロファイルがプリンターの
              色域として興味深いと示す場所（つまり実際の色空間の形）に
              パッチを集中。

        targenのデフォルトは初回パスで0.10（弱）、-c 設定時は1.0です。
        ChromIQは、挙動が突然切り替わる不意打ちを避けるため、明示的に
        変更しない限り0.10のままにします。

        最初のプロファイルを信頼し、2枚目のチャートにデバイス空間の
        空疎な隅ではなくプリンターの実際の色域を密にサンプリングさせたい
        改良パスでは、1.0へ近づけてください。

        有効にするにはチェックボックスをオンに。
    "-m":
      name: "キューブ内部ステップ"
      tooltip_title: "キューブ内部ステップ (-m)"
      tooltip_body: |-
        プリンターの色キューブの「内部」に規則的なパッチグリッドを
        追加します — 各軸にNステップ（RGBならN×N×Nなど）。これらは
        -f、-g、-s や他のカウンターで選んだパッチに「加えて」配置
        されます。

        0（デフォルト）でスキップ — ほぼ常に正しい選択です。
        OFPSが既にキューブ内部をより効率的にカバーしています。

        使いどき:
          • マシン間の再現性: 固定グリッドはtargenがどのOFPS配置を
            選んだかに関係なく毎回同じで、実行間のプロファイル比較に
            役立ちます。
          • 予測可能で名前の付いたキューブ位置が欲しい診断チャート。

        使う場合の典型値: 3〜6（軸あたりのステップ）。数は急速に
        増えます — RGBで6ステップは216パッチ、8なら512です。

        有効にするにはチェックボックスをオンに。
    "-M":
      name: "キューブ表面ステップ"
      tooltip_title: "キューブ表面ステップ (-M)"
      tooltip_body: |-
        プリンターの色キューブの「表面」に規則的なパッチグリッドを
        追加します — 各面にNステップ。パッチは外側（一次色、二次色、
        色域エッジ）に置かれ、内部には置かれません。

        0（デフォルト）でスキップ。

        使いどき:
          • -m の内部オーバーヘッドなしに、色域境界と一次/二次色の
            角を確実に押さえたい場合。
          • インクや用紙の違いが色域の外形をどう動かすかの比較 —
            表面パッチこそ最も影響を受けるパッチです。

        使う場合の典型値: 面あたり4〜8ステップ。

        有効にするにはチェックボックスをオンに。
    "-b":
      name: "体心立方ステップ"
      tooltip_title: "体心立方ステップ (-b)"
      tooltip_body: |-
        体心立方（BCC）格子上にパッチを追加します — 立方体の角と中心の
        両方に点を置くため、単純な立方グリッドより密です。Nは各軸の
        分割数です。

        0（デフォルト）でスキップ — ニッチな調整項目です。

        使いどき:
          • OFPSまで行かずに、-m より良い充填の、規則的で格子に沿った
            パッチ位置が欲しい場合。
          • BCC構造そのものが目的の、研究/再現性のシナリオ。

        注: これは「ステップカウンター」形式です（パッチリストに追加）。
        分布「全体」をBCCにしたチャートには、上の「パッチ分布」
        セレクターで体心立方のオプションを選んでください。

        有効にするにはチェックボックスをオンに。
  printtarg:
    "-i":
      name: "測定器"
      tooltip_title: "測定器 (-i)"
      tooltip_body: |-
        印刷チャートの読み取りに使う分光測色計をチャート生成器に
        伝えます。パッチグリッドはその測定器のストリップ幅、パッチ
        サイズ、間隔に合わせて構築されるため、これを正しく選ぶことが
        不可欠です。

          •  i1Pro / i1Pro 2 / i1Pro 3 — ハンドヘルドのストリップ
             リーダーで、最も一般的な選択。パッチの列を1回のスイープ
             で読みます。

          •  i1Pro 3 Plus — i1Pro 3の大口径版。大きいパッチを読むため、
             1枚あたりの数はかなり少なくなります（通常のi1Proの約1/5）。

          •  ColorMunki / i1Studio / ColorChecker Studio — エントリー
             向けデバイス。単体ではパッチを1つずつ読みます。オプションの
             測定ガイドを使うとペアで読めます（ダブルデンシティ参照）。

          •  SpectroScan — フラットベッドXYスキャナー。電動アームが
             各パッチを個別に読むため、どのストリップリーダーより
             はるかに多くの色を1枚に詰め込めます。

          •  i1iSis（i1Profiler経由）— 自動シートフィード式チャート
             リーダー。ChromIQはこのデバイスを直接制御できません:
             代わりにパッチリストをチャートと並べてi1Profiler独自の
             形式で保存し、残りのワークフロー（印刷、スキャン、
             プロファイル作成）はそちらで行います。このデバイスでは
             ChromIQの印刷タブと測定タブは使いません。

        間違った測定器を選ぶと、デバイスが位置合わせも確実な読み取り
        もできないチャートができます — 測定時に「パッチが見つからない」
        や位置合わせのエラーが出ます。ガイドモードではレイアウトが
        この選択に自動的に適応します。
      labels:
        - "i1Pro / i1Pro 2 / i1Pro 3"
        - "i1Pro 3 Plus"
        - "ColorMunki / i1Studio / ColorChecker Studio"
        - "SpectroScan（フラットベッド）"
        - "i1iSis（i1Profiler経由）"
    "-h":
      name: "ダブルデンシティ"
      tooltip_title: "ダブルデンシティ (-h)"
      tooltip_body: |-
        printtargレイアウトのストリップあたりのパッチ密度を変更します。
        正確な意味は使用中の測定器によります:

          •  ColorMunki / i1Studio / ColorChecker Studio — 各測定
             ストリップに収まるパッチ数を2倍にします。物理的な測定
             ガイドアクセサリが必須です。ないとデバイスは密な間隔に
             合わせられず誤読します。

          •  SpectroScan — チャートレイアウトを四角形から六角形の
             パッチに切り替えます。六角形はより密に敷き詰められる
             ため、1枚あたり約14%多くのパッチが収まります。追加の
             ハードウェアは不要です。

        i1Proとi1Pro 3 Plusには効果がなく、それらが選択されている
        ときは通常非表示です。
    "-p":
      name: "用紙サイズ"
      tooltip_title: "用紙サイズ (-p)"
      tooltip_body: |-
        印刷チャートの各シートの寸法を設定します。チャートは常に
        ページを端から端まで埋めます — 大きい用紙ほど多くのパッチが
        収まり、少ない枚数でより詳細なプロファイルになります。

        実際に印刷するサイズを、向きも含めて選んでください。ストリップ
        リーダー（i1Proファミリー）は上から下へ読むため:

          •  縦 — 長いストリップが少数。標準的な選択。

          •  横（A4R、LetterR、420×297…）— 短いストリップが多数。
             プリンターが横向き給紙の方が確実な場合や、縦のシートでは
             最後のストリップが紙の端に近づきすぎる場合に。

        名前付きサイズに使用する用紙が見当たらない場合は「カスタム」を
        選び、正確な幅と高さをミリメートルで入力してください。

        用紙サイズを変えると、コマンドプレビューのパッチ数とページ数は
        自動的に更新されます。
      labels:
        - "A2 縦 (420 × 594 mm)"
        - "A2 横 (594 × 420 mm)"
        - "A3ノビ 縦 (329 × 483 mm)"
        - "A3ノビ 横 (483 × 329 mm)"
        - "A3 縦 (297 × 420 mm)"
        - "A3 横 (420 × 297 mm)"
        - "タブロイド / 11 × 17\""
        - "リーガル (8.5 × 14\")"
        - "A4 縦 (210 × 297 mm)"
        - "A4 横 (297 × 210 mm)"
        - "レター 縦 (8.5 × 11\")"
        - "レター 横 (11 × 8.5\")"
        - "8×10\" (203 × 254 mm)"
        - "5×7\" (127 × 178 mm)"
        - "4×6\" (102 × 152 mm)"
        - "カスタム（寸法を入力）"
    "-t":
      name: "TIFF出力DPI"
      tooltip_title: "TIFF解像度 (-t)"
      tooltip_body: |-
        TIFFラスターチャートファイルの出力解像度です。
        ストリップ読み取り測定器には300 DPIを推奨します。ファイル
        サイズとパッチの鮮明さのバランスが良好です。
        非常に大きなチャートではファイルサイズを抑えるため200 DPIを。
        高い値（600以上）はめったに必要なく、大きなファイルを生みます。
    "-L":
      name: "左クリップ帯を抑制"
      tooltip_title: "左クリップ帯を抑制 (-L)"
      tooltip_body: |-
        左端のクリップ用帯を取り除き、ページ幅の約15mmを追加の
        パッチ列のために確保します。
        物理的なページ固定治具を使わない限り有効にしてください。
        パッチデータベースのすべての値はこのフラグがオンである前提です。
    "-a":
      name: "パッチサイズスケール"
      tooltip_title: "パッチサイズスケール (-a)"
      tooltip_body: |-
        パッチとスペーサーの寸法を一律にスケーリングします。
        1.0がデフォルト（測定器に最適化されたサイズ）です。
        測定器がより大きな測定面積を必要とする粗い/テクスチャーの
        ある用紙では1.5〜2.0に上げてください。
        1.0未満に下げると1ページあたりのパッチは増えますが、一部の
        測定器で読み取りエラーの原因になることがあります。
        注: この値をデフォルトから変えると、高速なルックアップの
        代わりにリアルタイムの二分探索再計算が走ります。
    "-m":
      name: "マージン (mm)"
      tooltip_title: "マージン (-m / -M)"
      tooltip_body: |-
        印刷可能領域 (-m) とTIFFファイル寸法 (-M) の両方のマージンを
        ミリメートルで設定します。両者は常に同期されます。
        6mmはほとんどのプリンターの最小マージンに一致します。プリンター
        がフチなし印刷に対応している場合のみ減らしてください。

        i1Pro / i1Pro 2 / i1Pro 3 / i1Pro 3 Plusの測定器を選ぶと自動的に
        10mmへ引き上げられ、ストリップリーダーの光学部が紙のむき出しの
        端にずれ込むのを防ぎます（「読めたパッチが足りない」エラー）。
        ColorMunki / SpectroScanに切り替えると6mmに戻ります。カスタム値
        （6でも10でもない値）は測定器を変えても保持されます。

        1ページあたりのパッチ数のルックアップテーブルは6mmと10mmにのみ
        存在します — 他の値はリアルタイムの二分探索再計算を引き起こします。
    "-r":
      name: "パッチ順を維持（非ランダム化）"
      tooltip_title: "非ランダム化 (-r)"
      tooltip_body: |-
        デフォルトでprinttargは測定器のドリフトによるアーティファクトを
        減らすため、パッチ位置をランダム化します。特定のパッチ順序を
        テストする場合や、測定器が整列したパッチを必要とする場合のみ
        このフラグを有効にしてください。
    "-b":
      name: "白黒スペーサーを強制"
      tooltip_title: "白黒スペーサーを強制 (-b)"
      tooltip_body: |-
        ストリップ間のスペーサーを色付きではなく黒/白に強制します。
        パッチ数やレイアウトの形状には影響しません。

        「スペーサーなし」(-n) が有効なときは効果がありません — その
        場合このオプションはグレー表示になり、printtargコマンドから
        除外されます。
    "-P":
      name: "ストリップ長を制限しない"
      tooltip_title: "ストリップ長を制限しない (-P)"
      tooltip_body: |-
        デフォルトでprinttargは、すべてのストリップが紙からはみ出さずに
        収まるようストリップ長に上限を設けます。このフラグを有効にすると
        その制限が外れ、非常に長いストリップが可能になります。
        幅の狭いロール紙や、所定のパッチ数でストリップ数をできるだけ
        少なくしたい場合に便利です。
        警告: パッチ数が多いとストリップが紙の端を超えることがあります —
        印刷前に生成されたTIFFを確認してください。
    "-N":
      name: "NチャンネルTIFF（5インク以上）"
      tooltip_title: "NチャンネルTIFF (-N)"
      tooltip_body: |-
        4を超えるインクチャンネルを持つプリンター（CMYK + 追加の特色
        など）では、標準のTIFFは4チャンネルまでしか対応しません。
        このフラグはprinttargに、TIFFのアルファチャンネルスロットを
        使って追加チャンネルをエンコードさせ、すべてのインク値を
        1つのファイルに保存します。

        プリンタードライバーやRIPがマルチチャンネルTIFFを期待する
        場合のみ有効にしてください。標準のRGBやCMYKのプロファイル
        作成では不要です。
    "-K":
      name: "キャリブレーションを適用"
      tooltip_title: "パッチにキャリブレーションを適用 (-K)"
      tooltip_body: |-
        プリンターに内蔵のキャリブレーション機構がない場合 — つまり
        プリンタードライバーやRIPが自力でキャリブレーションカーブを
        適用できない場合に使ってください。

        まずArgyllのprintcalを実行し、プリンターのリニアライズ方法を
        記述した .cal ファイルを作ります。それをここに渡すと、printtarg
        はチャート生成前にすべてのパッチ色値をキャリブレーションカーブ
        に通して再マップするため、印刷されるターゲットは最初から
        キャリブレーション済みのデバイス挙動を反映します。
        .cal は .ti2 ファイルにも埋め込まれ、colprofがICCプロファイル
        作成時に参照できます。

        典型的な用途: 内蔵リニアライゼーションのない、RIPを介さず
        TIFFから直接駆動するデスクトップインクジェットプリンター。

        「キャリブレーションを含める」(-I) と相互排他です — 同時に
        有効にできるキャリブレーションオプションは1つだけです。
    "-I":
      name: "キャリブレーション参照のみ"
      tooltip_title: "適用せずキャリブレーションを含める (-I)"
      tooltip_body: |-
        プリンターやRIPが既にネイティブでキャリブレーションカーブを
        適用している場合 — 例えば独自のリニアライゼーションLUTを持つ
        業務用インクジェットRIPや、濃度キャリブレーション内蔵の
        プリンター — に使ってください。

        この場合、printtargにパッチ値を再マップさせたくはありません
        （プリンターが自分で処理します）が、colprofにはキャリブレー
        ションを知らせたい。-I は .cal ファイルをメタデータとしてのみ
        .ti2 出力に埋め込み、パッチ値には一切手を付けません。

        典型的な用途: プロ向けインクジェットRIP（EFI Fiery、Wasatch、
        ColorBurstなど）や、プロファイル用印刷の最中に有効な内蔵
        リニアライゼーションを持つプリンター。

        「キャリブレーションを適用」(-K) と相互排他です — 同時に有効に
        できるキャリブレーションオプションは1つだけです。
    "-C":
      name: "TIFF圧縮を無効化"
      tooltip_title: "TIFF圧縮を無効化 (-C)"
      tooltip_body: |-
        デフォルトのLZW圧縮の代わりに非圧縮のTIFFファイルを出力します。
        非圧縮ファイルは大きくなりますが、すべてのRIPとプリンター
        ドライバーで普遍的に互換性があります。
        印刷ワークフローが圧縮TIFFを拒否したり壊したりする場合に
        有効にしてください。
    "-D":
      name: "16ビットから8ビットへディザ"
      tooltip_title: "8ビット出力をディザ (-D)"
      tooltip_body: |-
        8ビットTIFFを生成するとき、内部の16ビット精度からの
        ダウンサンプリングに誤差拡散ディザリングを使います。量子化が
        原因で滑らかなグラデーションに出るバンディングを減らします。
        8ビットTIFF出力が選択されているときのみ効果があります。
    "-U":
      name: "CUPSカラーマネジメントヘッダーを抑制"
      tooltip_title: "CUPS CMMヘッダーを抑制 (-U)"
      tooltip_body: |-
        PostScriptとEPS出力ファイルから「cupsJobTicket:
        cups-disable-cmm」コメントを取り除きます。CUPSのバージョンに
        よってこのコメントへの反応が異なります。
        このオプションはPS/EPS出力にのみ影響し、TIFFファイルには
        効果がありません。印刷中に予期しないカラーマネジメントが
        適用される問題が起きている場合のみ有効にしてください。
    "-R":
      name: "ランダム化シード"
      tooltip_title: "ランダム化シード (-R)"
      tooltip_body: |-
        パッチランダム化アルゴリズムの開始シードを設定します。
        同じシードと同じパッチ数なら常に同じパッチレイアウトが生成され、
        チャートが完全に再現可能になります。
        研究用途や、後日まったく同じチャートを再生成する必要がある
        場合に便利です。
        「パッチ順を維持」(-r) が有効なときは効果がありません。
    "-Q":
      name: "量子化ビット数"
      tooltip_title: "パッチ値を量子化 (-Q)"
      tooltip_body: |-
        チャート生成前に、すべてのパッチ色値を指定ビット深度に収まる
        よう丸めます。例えば -Q 8 はすべての値を8ビット（256階調）の
        精度に丸めます。
        プリンターのパイプラインが特定のビット深度でバンディングを
        起こし、ちょうどその精度でテストしたい場合に使ってください。
    "-A":
      name: "スペーサーのみのスケール"
      tooltip_title: "スペーサーのみのスケール (-A)"
      tooltip_body: |-
        -a で設定したパッチ寸法は変えずに、スペーサーバーにのみ追加の
        スケーリング係数を適用します。
        1.0より大きい値はスペーサーを広く、小さい値は狭くします。
        ストリップ間の分離を多めに必要とする測定器や、パッチサイズは
        保ったままスペーサーを細くしてスペースを取り戻したい場合に
        便利です。

        「スペーサーなし」(-n) が有効なときは効果がありません — その
        場合このオプションはグレー表示になり、printtargコマンドから
        除外されます。
    "-n":
      name: "スペーサーなし"
      tooltip_title: "スペーサーなし (-n)"
      tooltip_body: |-
        パッチとストリップの間のスペーサーバーをすべて取り除きます。
        スペーサーは通常、測定器がストリップの境界と方向を識別する
        助けになります。
        測定ワークフローが明示的にスペーサーに依存しない場合（一部の
        フラットベッドスキャナー環境など）のみ無効にしてください。

        有効にすると、「白黒スペーサーを強制」(-b) と「スペーサーのみの
        スケール」(-A) は、どちらもスペーサーにしか影響しないため
        自動的に無効になります。
    "-c":
      name: "カラースペーサーを強制"
      tooltip_title: "カラースペーサーを強制 (-c)"
      tooltip_body: |-
        パッチ間のスペーサー領域を、デフォルト（測定器プロファイルに
        よっては黒/白）ではなくカラーで描画させます。黒いスペーサーが
        暗いパッチに対してコントラスト不足になる一部のカラーインク
        ジェットデバイスで、ストリップ認識を改善できます。
  chartread:
    "-B":
      name: "双方向ストリップ認識を無効化"
      tooltip_title: "双方向読み取りを無効化 (-B)"
      tooltip_body: |-
        ストリップを順方向と逆方向のどちらでスキャンしたかをchartread
        に自動検出させないようにします。ChromIQはデフォルトでこれを
        オフにし、測定器がどちらの方向でもストリップを読めるように
        しています。

        測定中に測定器が誤ったストリップ方向エラーを報告する場合のみ
        オンにしてください。
    "-b":
      name: "双方向ストリップ認識を強制"
      tooltip_title: "双方向読み取りを強制 (-b)"
      tooltip_body: |-
        どちらの方向でスキャンしたストリップもchartreadに受け入れさせ
        ます。

        通常chartreadはランダム化されたチャートでのみストリップ方向を
        自動検出します。固定順のチャートでは一方向しか読まず、逆向きに
        スキャンしたストリップを拒否します。これをオンにするとチャート
        に関係なく検出を強制します — 両方向を読めるi1 Proファミリーに
        便利です。-B の逆の働きで、適用できるのはどちらか一方だけです。
    "-S":
      name: "警告メッセージを抑制"
      tooltip_title: "警告を抑制 (-S)"
      tooltip_body: |-
        chartreadの致命的でない測定警告ダイアログを抑制します。
        無人またはバッチ測定セッションに推奨です。
        プロファイル生成を妨げるエラーは引き続き報告されます。
    "-N":
      name: "初期キャリブレーションを無効化"
      tooltip_title: "初期キャリブレーションを無効化 (-N)"
      tooltip_body: |-
        起動時の測定器の白色基準板自動キャリブレーションを省略します。
        このセッションで既に測定器をキャリブレーション済みで、再キャリ
        ブレーションせずに追加のチャートを測定したい場合のみ使って
        ください。
    "-p":
      name: "パッチ単位モード"
      tooltip_title: "パッチ単位モード (-p)"
      tooltip_body: |-
        ストリップ読み取りから個別パッチ測定に切り替えます。
        手持ちでの単発測定や、特定の用紙でストリップ読み取りが失敗する
        場合に便利です。大きなチャートではかなり遅くなります。
    "-H":
      name: "高解像度スペクトルモード"
      tooltip_title: "高解像度スペクトル (-H)"
      tooltip_body: |-
        対応する測定器（i1Pro 2/3など）で高解像度スペクトルサンプリング
        を有効にします。より正確なLab値が得られますが、測定時間が
        わずかに延びます。
    "-T":
      name: "パッチ一貫性の許容値"
      tooltip_title: "パッチ許容値の乗数 (-T)"
      tooltip_body: |-
        chartread内蔵のパッチ一貫性しきい値に掛ける乗数です — ΔE値
        ではありません。chartreadは各パッチを読み直し、読み取り同士の
        差が「しきい値 × この数」を超えるストリップを拒否します。

        低いほど厳格です。厳格な設定は本当の問題を早期に捉えます:
        詰まったインクジェットノズル、インク不足、汚れたドラムローラー、
        ドリフトするレーザートナー。健全なプリンター + 分光測色計の
        組み合わせなら、デフォルトの0.7は十分な余裕を残します。
        printerknowledge.comの経験豊富なユーザーはi1 Pro 2 / 3で0.4を
        使っています。

        テクスチャー紙、マット紙、ファインアート紙で誤った「パッチが
        一貫しない」エラーが出る場合は0.8〜1.5に上げてください — そこ
        では表面自体が実際のばらつきを生みます。2を超える値はほとんどの
        場合本物の問題を隠します。必要になったら、まずプリンターを
        直してください。
    "-l":
      name: "D50 L*a*b*値を保存"
      tooltip_title: "XYZの代わりにL*a*b*を保存 (-l)"
      tooltip_body: |-
        測定データをXYZの代わりにD50 L*a*b*値で保存します。
        ほとんどのワークフローはXYZ（デフォルト）を使います。下流の
        ツールが特にL*a*b*入力を要求する場合のみ有効にしてください。
    "-X":
      name: "カラリメーター補正行列"
      tooltip_title: "カラリメーター補正行列 (-X)"
      tooltip_body: |-
        カラリメーター補正行列（.ccmx）またはキャリブレーション
        スペクトルセット（.ccss）を適用し、カラリメーターの精度を
        改善します。
        カラリメーター（フィルター式測色計）にのみ関係します
        （分光測色計には不要）。
        正しいファイルは測定器メーカーから入手するか、ArgyllCMSの
        ccss/ccmxツールで作成してください。
  colprof:
    "-D":
      name: "プロファイルの説明"
      tooltip_title: "プロファイルの説明 (-D)"
      tooltip_body: |-
        ICCプロファイルに埋め込まれる名前です — Photoshop、Lightroom、
        プレビューなどのカラーマネジメントメニューに表示されます。

        後で正しいプロファイルを見つけやすいよう、プリンター、用紙、
        インク種、日付がわかる一貫した形式を使ってください:

          プリンター · 用紙 · インク種 · 日付
          例: 「Epson P900 · Canson Baryta · Chromatic · 2026-04」

        出力ファイルは .ti3 ファイルにちなんで名付けられます — その名前
        は説明と揃え、スペースの代わりにアンダースコアを使ってください:
          例: EpsonP900_CansonBaryta_Chromatic_2026-04.icc
    "-a":
      name: "プロファイルアルゴリズム"
      tooltip_title: "プロファイルアルゴリズム (-a)"
      tooltip_body: |-
        色変換アルゴリズムを選びます:
        • Lab cLUT (-al): プリンタープロファイルに最高の精度。
          L*a*b*空間の完全な3Dルックアップテーブルを使います。推奨。
        • XYZ cLUT (-ax): Labに似ていますがXYZ空間です。
          ニュートラルの階調がより滑らかになることがあります。
        • 行列/ガンマ (-ag, -as): よりシンプルなモデル。複雑な
          プリンター挙動には精度が落ちますが計算は高速です。
        初めてのRGBプリンタープロファイルには必ずLab cLUT (-al) を。
      labels:
        - "l — Lab cLUT（RGBプリンターに推奨）"
        - "x — XYZ cLUT"
        - "X — XYZ cLUT（絶対的）"
        - "g — ガンマ + 行列（高速、低精度）"
        - "G — ガンマ + 行列（強制）"
        - "s — 単一ガンマ + 行列"
        - "S — 単一ガンマ + 行列（強制）"
        - "m — 行列のみ"
        - "M — 行列のみ（強制）"
    "-q":
      name: "プロファイル品質"
      tooltip_title: "プロファイル品質 (-q)"
      tooltip_body: |-
        cLUTグリッドの解像度とスムージングの反復回数を制御します:
        • 低: 17³グリッド — クイックテスト用、本番には不向き
        • 中: 33³グリッド — バランス良好、推奨デフォルト
        • 高: 45³グリッド — 本番品質
        • ウルトラ: 65³グリッド — 最高精度、非常に遅い
        ほとんどのインクジェット作業には中品質で十分です。
        ファインアートや契約校正の用途には高を使ってください。
      labels:
        - "l — 低（高速、約30秒）"
        - "m — 中（推奨、約2分）"
        - "h — 高（約10分）"
        - "u — ウルトラ（約30分以上）"
    "-b":
      name: "B2Aテーブル品質"
      tooltip_title: "B2Aテーブル品質 (-b)"
      tooltip_body: |-
        入力（ソフトプルーフなど）変換に使うB2A（デバイス→PCS）
        テーブルの品質を独立に制御します。
        空欄でメインの -q 品質設定に合わせます。
        「n」でB2Aテーブルを省略し、プロファイルのファイルサイズを
        減らせます（出力専用プロファイルにB2Aは不要です）。
      labels:
        - "プロファイル品質と同じ（デフォルト）"
        - "l — 低"
        - "m — 中"
        - "h — 高"
        - "u — ウルトラ"
        - "n — なし（B2Aテーブルを省略）"
    "-r":
      name: "スムージング / ノイズ (%)"
      tooltip_title: "平均デバイスノイズ (-r)"
      tooltip_body: |-
        測定またはデバイスの平均ノイズの推定値（ΔEに対するパーセント）
        です。値を上げるとプロファイルのスムージングが強まり、外れた
        パッチの影響が減ります。
        • 0.5%: クリーンな測定、よく整備されたプリンター
        • 1.0〜2.0%: ノイズの多い測定やテクスチャー紙
        • 3.0〜5.0%: 非常にノイズが多い。スムージングが大幅に強まる
    "-s":
      name: "色域ソース（知覚的）"
      tooltip_title: "知覚的色域マッピングソース (-s)"
      tooltip_body: |-
        知覚的レンダリングインテントの色域マッピングテーブル
        （A2B / B2A知覚的）の計算に使うソースICCプロファイルです。
        これがないと、知覚的インテントは測色データを直接使います
        （色域圧縮なし）。
        通常はAdobeRGBやProPhoto RGBのような標準のRGB作業空間を
        設定します。
        .icc と .icm の両方を受け付けます — ICMはICCプロファイル
        形式のMicrosoftでの呼び名にすぎず、両者は同一です。
    "-S":
      name: "色域ソース（知覚 + 彩度）"
      tooltip_title: "知覚的 + 彩度ソース (-S)"
      tooltip_body: |-
        -s と同様ですが、色域マッピングを知覚的と彩度の両方の
        レンダリングインテントに適用します。
    "-A":
      name: "メーカー"
      tooltip_title: "メーカー文字列 (-A)"
      tooltip_body: |-
        ICCプロファイルヘッダーに埋め込まれるメーカー文字列です。
        任意 — プロファイル選択UIでの識別に使われます。
    "-M":
      name: "モデル"
      tooltip_title: "モデル文字列 (-M)"
      tooltip_body: |-
        ICCプロファイルヘッダーに埋め込まれるモデル文字列です。
    "-C":
      name: "著作権"
      tooltip_title: "著作権文字列 (-C)"
      tooltip_body: |-
        ICCプロファイルに埋め込まれる著作権表示です。
    "-ni":
      name: "入力シェイパーカーブなし"
      tooltip_title: "入力シェイパーカーブなし (-ni)"
      tooltip_body: |-
        3D cLUTの前にデバイス値を前処理する1D入力シェイパー（トーン）
        カーブを無効にします。これらのカーブは通常プロファイルの精度を
        向上させます。診断目的でのみ無効にしてください。
    "-no":
      name: "出力シェイパーカーブなし"
      tooltip_title: "出力シェイパーカーブなし (-no)"
      tooltip_body: |-
        3D cLUTの後に適用される1D出力シェイパーカーブを無効にします。
        診断目的でのみ無効にしてください。
    "-V":
      name: "暗部グリッドの強調"
      tooltip_title: "暗部グリッドの強調 (-V)"
      tooltip_body: |-
        暗い（シャドウ）領域にcLUTグリッド点を追加します。
        1.0 = 均一グリッド（デフォルト）。シャドウの挙動が複雑な
        プリンターや黒つぶれには1.5〜2.0に上げてください。
  profcheck:
    "-v":
      name: "詳細度"
      tooltip_title: "詳細度 (-v)"
      tooltip_body: |-
        パッチ単位モードは各パッチの個別ΔE値を出力します。これは
        ストリップ単位の分析とガイド付き改良に必須です。サマリー
        モードは平均と最大の誤差のみ表示します。
      labels:
        - "2 — パッチ単位（ストリップ分析に必須）"
        - "1 — サマリーのみ"
    "-I":
      name: "レンダリングインテント"
      tooltip_title: "レンダリングインテント (-I)"
      tooltip_body: |-
        「絶対的」は白点を含む絶対的な色精度を検証します — プリンター
        プロファイル作成の標準です。
        「相対的」はメディアの白点に正規化します。
      labels:
        - "a — 絶対的（デフォルト）"
        - "r — 相対的"
    "-s":
      name: "ΔE順に並べ替え（悪い順）"
      tooltip_title: "ΔEで並べ替え (-s)"
      tooltip_body: |-
        profcheckの出力を、成績の悪いパッチが先頭に来るよう並べ替え
        ます。問題領域を素早く特定するのに便利です。
        詳細度がパッチ単位のときのみ有効です。
    "-i":
      name: "光源"
      tooltip_title: "光源 (-i)"
      tooltip_body: |-
        スペクトル測定を色の値に変換するときの光源を選びます。
        .ti3 にスペクトルデータが含まれる場合のみ意味があります。
        D50がプリントプロファイル作成の標準です。
      labels:
        - "D50（デフォルト）"
        - "D50M2（D50 + UVフィルター）"
        - "D65（昼光 6500 K）"
        - "A（タングステン / 白熱灯）"
        - "C（昼光シミュレーション、旧式）"
        - "F5（蛍光灯 CWF）"
        - "F8（蛍光灯 D50シミュレーション）"
        - "F10（蛍光灯 Ultralume）"
    "-o":
      name: "CIE観測者"
      tooltip_title: "CIE観測者 (-o)"
      tooltip_body: |-
        測色計算の標準観測者モデルを定義します。
        1931 2°観測者がプリントプロファイル作成のICC標準です。
        特に必要がない限りデフォルトのままにしてください。
      labels:
        - "1931 2°（デフォルト）"
        - "1964 10°"
        - "2015 2°（Stockman）"
        - "2015 10°（Stockman）"
        - "Shaw & Fairchild"
    "-P":
      name: "外れパッチを除外（ΔE ≤）"
      tooltip_title: ".ti3をΔE ≤ に刈り込む (-P)"
      tooltip_body: |-
        設定したしきい値以下の色誤差のパッチだけを含む、縮小版の
        .ti3 ファイルを作ります。
        測定に失敗したパッチがプロファイルの足を引っ張っている場合に
        便利です。
        このオプションを有効にし、許容できる最大ΔE値を設定して
        ください。
    "-w":
      name: "X3DOM 3D可視化を作成"
      tooltip_title: "X3DOM可視化 (-w)"
      tooltip_body: |-
        プロファイルの色誤差の、インタラクティブな3D HTML可視化を
        生成します。生成された .x3d.html ファイルを最新のブラウザで
        開くと、色域のどの部分の誤差が最大かを探索できます。
  printcal:
    "-v":
      name: "詳細度"
      tooltip_title: "詳細度 (-v)"
      tooltip_body: |-
        キャリブレーション中にprintcalがどれだけ出力するかを制御します。
          0 = 出力なし
          1 = 基本的な進捗（デフォルト）
          2 = チャンネルごとの詳細情報
          3 = デバッグ出力
    "-s":
      name: "カーブスムージング"
      tooltip_title: "カーブスムージング (-s)"
      tooltip_body: |-
        キャリブレーションカーブに追加で適用するスムージングの量を
        制御します。値が高いほど滑らかですが精密さの落ちるカーブに
        なります。

        デフォルト: 1.0 — ほとんどのプリンターに良好です。
        プリンターのトーン応答にノイズが多い場合や、キャリブレーション
        カーブがギザギザに見える場合は上げて（例: 2.0〜5.0）ください。
    "-z":
      name: "カーブ解像度"
      tooltip_title: "カーブ解像度 (-z)"
      tooltip_body: |-
        出力キャリブレーションカーブテーブルのステップ数です。
        値が高いほど解像度は細かくなりますが .cal ファイルは大きく
        なります。デフォルト（256）は事実上すべてのプリンターに適して
        います。
    "-A":
      name: "メーカー"
      tooltip_title: "メーカー (-A)"
      tooltip_body: |-
        .cal ファイルに埋め込まれるメーカーの説明を設定します。
        純粋に情報用 — キャリブレーションカーブには影響しません。
    "-M":
      name: "モデル"
      tooltip_title: "モデル (-M)"
      tooltip_body: |-
        .cal ファイルに埋め込まれるプリンターモデルの説明を設定します。
        純粋に情報用 — キャリブレーションカーブには影響しません。
    "-D":
      name: "説明"
      tooltip_title: "説明 (-D)"
      tooltip_body: |-
        .cal ファイルに埋め込まれる人間向けの説明を設定します。
        純粋に情報用 — キャリブレーションカーブには影響しません。
    "-C":
      name: "著作権"
      tooltip_title: "著作権 (-C)"
      tooltip_body: |-
        .cal ファイルに埋め込まれる著作権文字列を設定します。
        純粋に情報用 — キャリブレーションカーブには影響しません。
  applycal:
    "-v":
      name: "詳細"
      tooltip_title: "詳細 (-v)"
      tooltip_body: |-
        適用されるキャリブレーションについて、チャンネルごとのカーブ
        統計を含む詳細情報を表示します。
